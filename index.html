<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Pokédex"/>
<meta name="theme-color" content="#0d0d0f"/>
<title>Pokédex — Battle Helper</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root, [data-theme="dark"] {
    --red: #E63946;
    --bg: #0d0d0f;
    --card: #16161a;
    --surface: #1e1e24;
    --surface2: #26262e;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.16);
    --text: #f0f0f5;
    --muted: rgba(240,240,245,0.45);
    --dot-color: rgba(255,255,255,0.04);
    --stat-track: rgba(255,255,255,0.08);
    --hero-num: rgba(255,255,255,0.4);
    --toggle-bg: #26262e;
    --toggle-icon: #f0f0f5;
    --shadow: rgba(0,0,0,0.4);
    --immune-col: #a855f7;
    --resist-col: #22d3ee;
    --weak-col: #fb923c;
    --strong-col: #4ade80;
  }
  [data-theme="light"] {
    --bg: #e8e8f0;
    --card: #f8f8fc;
    --surface: #d8d8e4;
    --surface2: #c8c8d8;
    --border: rgba(0,0,0,0.13);
    --border-hover: rgba(0,0,0,0.25);
    --text: #0a0a14;
    --muted: rgba(10,10,20,0.55);
    --dot-color: rgba(0,0,0,0.045);
    --stat-track: rgba(0,0,0,0.1);
    --hero-num: rgba(255,255,255,0.6);
    --toggle-bg: #d0d0de;
    --toggle-icon: #0a0a14;
    --shadow: rgba(0,0,0,0.18);
    --immune-col: #6d28d9;
    --resist-col: #0e7490;
    --weak-col: #c2410c;
    --strong-col: #15803d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Outfit', system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; -webkit-tap-highlight-color: transparent; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, var(--dot-color) 1px, transparent 1px); background-size: 28px 28px; pointer-events: none; z-index: 0; }
  .page { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding-top: max(2.5rem, env(safe-area-inset-top)); padding-bottom: max(4rem, env(safe-area-inset-bottom)); padding-left: max(1.5rem, env(safe-area-inset-left)); padding-right: max(1.5rem, env(safe-area-inset-right)); }

  /* Header */
  .site-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
  .logo { display: flex; align-items: center; gap: 14px; cursor: pointer; }
  .logo:hover .pokeball { transform: rotate(20deg); }
  .pokeball { width: 44px; height: 44px; flex-shrink: 0; animation: spin-idle 8s linear infinite; transition: transform 0.3s; }
  @keyframes spin-idle { 0%,85%,100%{transform:rotate(0deg)} 90%{transform:rotate(15deg)} 95%{transform:rotate(-8deg)} }
  .logo-text h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; color: var(--text); }
  .logo-text h1 span { color: var(--red); }
  .logo-text p { font-size: 12px; color: var(--muted); font-weight: 400; margin-top: 3px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .gen-badge { background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 6px 14px; font-size: 12px; font-weight: 500; color: var(--muted); transition: background 0.3s, border-color 0.3s; }
  .gen-badge span { color: var(--red); font-weight: 600; }
  .theme-toggle { width: 38px; height: 38px; border-radius: 50%; background: var(--toggle-bg); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .theme-toggle:hover { border-color: var(--border-hover); transform: scale(1.08); }
  .theme-toggle svg { width: 17px; height: 17px; fill: var(--toggle-icon); transition: fill 0.3s; }
  .icon-sun { display: none; }
  .icon-moon { display: block; }
  [data-theme="light"] .icon-sun { display: block; }
  [data-theme="light"] .icon-moon { display: none; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 20px; padding: 5px; margin-bottom: 1.75rem; transition: background 0.3s; }
  .tab { flex: 1; padding: 10px; border-radius: 14px; border: none; background: transparent; color: var(--muted); font-family: 'Outfit', system-ui, sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--card); color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Search */
  .search-wrap { position: relative; margin-bottom: 0.75rem; }
  .search-box { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 0 20px; transition: border-color 0.2s, background 0.3s; }
  .search-box:focus-within { border-color: var(--red); box-shadow: 0 0 0 3px rgba(230,57,70,0.12); }
  .search-box svg { flex-shrink: 0; opacity: 0.4; color: var(--text); }
  #search { flex: 1; background: none; border: none; outline: none; padding: 16px 0; font-size: 16px; font-family: 'Outfit', system-ui, sans-serif; color: var(--text); }
  #search::placeholder { color: var(--muted); }
  .search-hint { font-size: 12px; color: var(--muted); margin-top: 8px; padding: 0 4px; }

  /* Dropdown */
  #dropdown { display: none; position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; z-index: 200; overflow: hidden; max-height: 280px; overflow-y: auto; transition: background 0.3s; }
  #dropdown::-webkit-scrollbar { width: 4px; }
  #dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .dd-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .dd-item:last-child { border-bottom: none; }
  .dd-item:hover { background: var(--surface); }
  .dd-img { width: 40px; height: 40px; image-rendering: pixelated; }
  .dd-name { flex: 1; font-size: 14px; font-weight: 500; text-transform: capitalize; color: var(--text); }
  .dd-num { font-size: 11px; color: var(--muted); }

  /* Empty / loading */
  #card { margin-top: 0.5rem; }
  .empty-state { text-align: center; padding: 4rem 2rem; border: 1.5px dashed var(--border); border-radius: 20px; background: var(--surface); transition: background 0.3s; }
  .empty-icon { width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
  .empty-state h2 { font-size: 17px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; color: var(--muted); }
  .loading-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }
  .loader { width: 32px; height: 32px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--red); animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Pokémon card */
  .poke-card { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); background: var(--card); animation: fadeUp 0.3s ease; transition: background 0.3s, border-color 0.3s; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .hero { position: relative; padding: 2.5rem 2rem 1.5rem; overflow: hidden; min-height: 200px; }
  .hero-bg { position: absolute; inset: 0; opacity: 0.15; }
  [data-theme="light"] .hero-bg { opacity: 0.28; }
  .hero-circles { position: absolute; right: -40px; top: -40px; width: 260px; height: 260px; border-radius: 50%; opacity: 0.08; }
  .hero-circles::after { content: ''; position: absolute; inset: 30px; border-radius: 50%; background: rgba(255,255,255,0.5); }
  .hero-num { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--hero-num); text-transform: uppercase; margin-bottom: 6px; position: relative; z-index: 2; }
  .hero-layout { display: flex; align-items: flex-end; justify-content: space-between; position: relative; z-index: 2; gap: 1rem; }
  .hero-info { flex: 1; }
  .hero-name { font-size: 36px; font-weight: 800; text-transform: capitalize; line-height: 1; letter-spacing: -1px; color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,0.4); margin-bottom: 12px; }
  .hero-types { display: flex; gap: 7px; flex-wrap: wrap; }
  .type-pill { padding: 5px 14px; border-radius: 100px; font-size: 12px; font-weight: 600; text-transform: capitalize; letter-spacing: 0.03em; border: 1px solid rgba(255,255,255,0.2); }
  .hero-sprite { width: 150px; height: 150px; image-rendering: pixelated; filter: drop-shadow(0 8px 24px var(--shadow)); flex-shrink: 0; transition: transform 0.3s ease; }
  .hero-sprite:hover { transform: translateY(-6px) scale(1.05); }
  .poke-body { padding: 1.75rem 2rem; }
  .section-label { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.75rem; }
  .stat-card { background: var(--surface); border-radius: 12px; padding: 12px 14px; border: 1px solid var(--border); transition: background 0.3s, border-color 0.3s; }
  .stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-bar-track { height: 3px; background: var(--stat-track); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 3px; }
  .sep { height: 1px; background: var(--border); margin: 1.75rem 0; }

  /* Matchup blocks */
  .matchup-block, .type-ms { margin-bottom: 1.5rem; }
  .matchup-block:last-child, .type-ms:last-child { margin-bottom: 0; }
  .matchup-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .m-chip { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 100px; font-size: 15px; font-weight: 600; text-transform: capitalize; border: 1px solid rgba(0,0,0,0.15); }
  .m-mult { font-size: 12px; font-weight: 700; opacity: 0.75; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 100px; }
  .immune-label { color: var(--immune-col); }
  .resist-label { color: var(--resist-col); }
  .weak-label { color: var(--weak-col); }
  .dblweak-label { color: var(--red); }
  .strong-label { color: var(--strong-col); }

  /* Stats toggle */
  .stats-toggle { display: flex; align-items: center; justify-content: space-between; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 11px 16px; cursor: pointer; font-family: 'Outfit', system-ui, sans-serif; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 1.75rem; transition: background 0.2s, border-color 0.2s; }
  .stats-toggle:hover { background: var(--surface2); border-color: var(--border-hover); color: var(--text); }
  .stats-toggle-left { display: flex; align-items: center; gap: 8px; }
  .stats-toggle-left span { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .stats-total-pill { background: var(--surface2); border-radius: 100px; padding: 2px 10px; font-size: 11px; font-weight: 600; color: var(--text); }
  .stats-chevron { width: 16px; height: 16px; transition: transform 0.25s; opacity: 0.5; }
  .stats-chevron.open { transform: rotate(180deg); }
  .stats-drawer { overflow: hidden; max-height: 0; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
  .stats-drawer.open { max-height: 600px; }
  .stats-drawer-inner { padding-bottom: 1.75rem; }

  /* Type browser */
  .type-intro { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; padding: 0 2px; }
  .types-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  @media(min-width:500px){ .types-grid { grid-template-columns: repeat(6, 1fr); } }
  .type-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 12px 8px 10px; cursor: pointer; transition: all 0.18s; font-family: 'Outfit', system-ui, sans-serif; }
  .type-btn:hover { background: var(--surface2); transform: translateY(-3px); border-color: var(--border-hover); box-shadow: 0 6px 18px rgba(0,0,0,0.18); }
  .type-btn.selected { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.22); }
  .type-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25), inset 0 2px 0 rgba(255,255,255,0.2); }
  .type-badge-img { width: 56px; height: 56px; border-radius: 14px; object-fit: contain; image-rendering: pixelated; display: block; }
  .type-btn-name { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: capitalize; }
  .type-result { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; animation: fadeUp 0.25s ease; transition: background 0.3s; }
  .type-result-hero { padding: 1.5rem 2rem; position: relative; overflow: hidden; }
  .type-result-hero-bg { position: absolute; inset: 0; opacity: 0.18; }
  [data-theme="light"] .type-result-hero-bg { opacity: 0.3; }
  .type-result-inner { position: relative; z-index: 2; display: flex; align-items: center; gap: 16px; }
  .type-result-icon { width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25), inset 0 2px 0 rgba(255,255,255,0.2); }
  .type-result-badge-img { width: 64px; height: 64px; border-radius: 16px; object-fit: contain; image-rendering: pixelated; display: block; }
  .type-result-name { font-size: 28px; font-weight: 800; text-transform: capitalize; color: #fff; letter-spacing: -0.5px; text-shadow: 0 2px 12px rgba(0,0,0,0.35); }
  .type-result-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 3px; }
  .type-result-body { padding: 1.5rem 2rem; }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <div class="logo" onclick="goHome()" title="Back to home">
      <div class="pokeball">
        <svg viewBox="0 0 100 100" width="44" height="44" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="49" fill="#222"/>
          <path d="M1 50 a49 49 0 0 1 98 0 Z" fill="#e63946"/>
          <path d="M1 50 a49 49 0 0 0 98 0 Z" fill="#f5f5f5"/>
          <rect x="1" y="44" width="98" height="12" fill="#111"/>
          <circle cx="50" cy="50" r="15" fill="#111"/>
          <circle cx="50" cy="50" r="11" fill="#f5f5f5"/>
          <circle cx="50" cy="50" r="5.5" fill="#222"/>
          <path d="M43 43 a9 9 0 0 1 9 -5" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M16 33 a38 38 0 0 1 14 -14" stroke="rgba(255,255,255,0.13)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <h1>Poké<span>dex</span></h1>
        <p>Battle Type Helper</p>
      </div>
    </div>
    <div class="header-right">
      <div class="gen-badge">Gen 1–<span>9</span> · Violet</div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
        <svg class="icon-moon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      </button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('pokemon',this)">Pokémon Search</button>
    <button class="tab" onclick="switchTab('types',this)">Browse by Type</button>
  </div>

  <div id="tab-pokemon" class="tab-panel active">
    <div class="search-wrap">
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.75"/>
          <path d="M12 12L16 16" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
        <input id="search" type="text" placeholder="Search by name or Pokédex number..." autocomplete="off"/>
      </div>
      <div id="dropdown"></div>
    </div>
    <p class="search-hint">Try "cramorant", "sprigatito", "miraidon", or type a number like "845"</p>
    <div id="card" style="margin-top:1rem">
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 100 100" width="72" height="72" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="49" fill="#222"/>
            <path d="M1 50 a49 49 0 0 1 98 0 Z" fill="#e63946"/>
            <path d="M1 50 a49 49 0 0 0 98 0 Z" fill="#f5f5f5"/>
            <rect x="1" y="44" width="98" height="12" fill="#111"/>
            <circle cx="50" cy="50" r="15" fill="#111"/>
            <circle cx="50" cy="50" r="11" fill="#f5f5f5"/>
            <circle cx="50" cy="50" r="5.5" fill="#222"/>
            <path d="M43 43 a9 9 0 0 1 9 -5" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        <h2>Search for a Pokémon</h2>
        <p>See type matchups, base stats, and weaknesses</p>
      </div>
    </div>
  </div>

  <div id="tab-types" class="tab-panel">
    <p class="type-intro">Tap any type to see its defensive matchups — what beats it, what it resists, and what it's strong against.</p>
    <div class="types-grid" id="types-grid"></div>
    <div id="type-result"></div>
  </div>

</div>
<script>
const TC={
  normal:{bg:'#8a8a7a',text:'#fff'},fire:{bg:'#c8312a',text:'#fff'},water:{bg:'#3b7fd4',text:'#fff'},
  electric:{bg:'#c8a800',text:'#fff'},grass:{bg:'#4a9e2a',text:'#fff'},ice:{bg:'#5aace0',text:'#fff'},
  fighting:{bg:'#c06010',text:'#fff'},poison:{bg:'#8844bb',text:'#fff'},ground:{bg:'#9c7038',text:'#fff'},
  flying:{bg:'#5090d0',text:'#fff'},psychic:{bg:'#cc3060',text:'#fff'},bug:{bg:'#7a9010',text:'#fff'},
  rock:{bg:'#909060',text:'#fff'},ghost:{bg:'#664488',text:'#fff'},dragon:{bg:'#4050b0',text:'#fff'},
  dark:{bg:'#333028',text:'#fff'},steel:{bg:'#4090a8',text:'#fff'},fairy:{bg:'#cc50cc',text:'#fff'}
};

const TYPE_IDS={
  normal:1,fighting:2,flying:3,poison:4,ground:5,rock:6,bug:7,ghost:8,steel:9,
  fire:10,water:11,grass:12,electric:13,psychic:14,ice:15,dragon:16,dark:17,fairy:18
};

const TYPE_SVG={
  normal:'<circle cx="14" cy="14" r="9" fill="none" stroke="currentColor" stroke-width="4.5"/><circle cx="14" cy="14" r="3.5" fill="currentColor"/>',
  fire:'<path d="M14 4C11 8 7 12 7 16.5a7 7 0 0014 0C21 12 17 8 14 4z" fill="currentColor"/><path d="M14 13c-1.5 2-2 3.5-2 5.5a2 2 0 004 0c0-2-.5-3.5-2-5.5z" fill="rgba(255,255,255,0.4)"/>',
  water:'<path d="M14 4l8 11a8 8 0 01-16 0z" fill="currentColor"/><ellipse cx="11" cy="13" rx="2" ry="3.5" fill="rgba(255,255,255,0.4)" transform="rotate(-20 11 13)"/>',

}

function typeBadgeHTML(type,size){
  const c=TC[type]||{bg:'#888'};
  const id=TYPE_IDS[type]||1;
  const url=typeImgUrl(type);
  return`<img src="${url}" width="${size}" height="${size}" alt="${type}" style="border-radius:${size===56?14:16}px;object-fit:contain;image-rendering:pixelated;display:block;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="type-icon" style="display:none;width:${size}px;height:${size}px;background:${c.bg}"><svg viewBox="0 0 28 28" width="${Math.round(size*0.54)}" height="${Math.round(size*0.54)}" fill="rgba(255,255,255,0.95)" xmlns="http://www.w3.org/2000/svg">${TYPE_SVG[type]||''}</svg></div>`;
}

const CHART={
  normal:{rock:0.5,ghost:0,steel:0.5},
  fire:{fire:0.5,water:0.5,grass:2,ice:2,bug:2,rock:0.5,dragon:0.5,steel:2},
  water:{fire:2,water:0.5,grass:0.5,ground:2,rock:2,dragon:0.5},
  electric:{water:2,electric:0.5,grass:0.5,ground:0,flying:2,dragon:0.5},
  grass:{fire:0.5,water:2,grass:0.5,poison:0.5,ground:2,flying:0.5,bug:0.5,rock:2,dragon:0.5,steel:0.5},
  ice:{fire:0.5,water:0.5,grass:2,ice:0.5,ground:2,flying:2,dragon:2,steel:0.5},
  fighting:{normal:2,ice:2,poison:0.5,flying:0.5,psychic:0.5,bug:0.5,rock:2,ghost:0,dark:2,steel:2,fairy:0.5},
  poison:{grass:2,poison:0.5,ground:0.5,rock:0.5,ghost:0.5,steel:0,fairy:2},
  ground:{fire:2,electric:2,grass:0.5,poison:2,flying:0,bug:0.5,rock:2,steel:2},
  flying:{electric:0.5,grass:2,fighting:2,bug:2,rock:0.5,steel:0.5},
  psychic:{fighting:2,poison:2,psychic:0.5,dark:0,steel:0.5},
  bug:{fire:0.5,grass:2,fighting:0.5,poison:0.5,flying:0.5,psychic:2,ghost:0.5,dark:2,steel:0.5,fairy:0.5},
  rock:{fire:2,ice:2,fighting:0.5,ground:0.5,flying:2,bug:2,steel:0.5},
  ghost:{normal:0,psychic:2,ghost:2,dark:0.5},
  dragon:{dragon:2,steel:0.5,fairy:0},
  dark:{fighting:0.5,psychic:2,ghost:2,dark:0.5,fairy:0.5},
  steel:{fire:0.5,water:0.5,electric:0.5,ice:2,rock:2,steel:0.5,fairy:2},
  fairy:{fire:0.5,fighting:2,poison:0.5,dragon:2,dark:2,steel:0.5}
};
const AT=Object.keys(CHART);

function calcDefMult(types){
  const m={};AT.forEach(t=>m[t]=1);
  types.forEach(def=>{AT.forEach(atk=>{const c=CHART[atk]||{};m[atk]*=(c[def]!==undefined?c[def]:1);});});
  return m;
}
function calcOffensive(types){
  const strong=[],notVery=[],noEffect=[];
  AT.forEach(defType=>{
    const best=Math.max(...types.map(atkType=>{const c=CHART[atkType]||{};return c[defType]!==undefined?c[defType]:1;}));
    if(best>=2)strong.push(defType);
    else if(best<=0)noEffect.push(defType);
    else if(best<=0.5)notVery.push(defType);
  });
  return{strong,notVery,noEffect};
}
function pill(t){const c=TC[t]||{bg:'#888',text:'#fff'};return`<span class="type-pill" style="background:${c.bg};color:${c.text}">${t}</span>`;}
function chip(t,lbl){const c=TC[t]||{bg:'#888',text:'#fff'};return`<span class="m-chip" style="background:${c.bg};color:${c.text}">${t}<span class="m-mult">${lbl}</span></span>`;}
function statColor(p){if(p>75)return'#22d3ee';if(p>50)return'#4ade80';if(p>30)return'#facc15';return'#f87171';}
function fname(n){return n.split('-').map(p=>p[0].toUpperCase()+p.slice(1)).join(' ');}
function fid(id){return'#'+String(id).padStart(4,'0');}
function artwork(id){return`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;}
function sprite(id){return`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;}

function allMatchupsHTML(types,cls){
  const defMult=calcDefMult(types);
  const{strong,notVery,noEffect}=calcOffensive(types);
  const w4=AT.filter(t=>defMult[t]===4),w2=AT.filter(t=>defMult[t]===2);
  const r05=AT.filter(t=>defMult[t]===0.5),r025=AT.filter(t=>defMult[t]===0.25);
  const imm=AT.filter(t=>defMult[t]===0);
  return[
    w4.length?`<div class="${cls}"><div class="section-label dblweak-label">Double weak — 4×</div><div class="matchup-row">${w4.map(t=>chip(t,'4×')).join('')}</div></div>`:'',
    w2.length?`<div class="${cls}"><div class="section-label weak-label">Weak — 2×</div><div class="matchup-row">${w2.map(t=>chip(t,'2×')).join('')}</div></div>`:'',
    strong.length?`<div class="${cls}"><div class="section-label strong-label">Strong against — 2×</div><div class="matchup-row">${strong.map(t=>chip(t,'2×')).join('')}</div></div>`:'',
    r05.length?`<div class="${cls}"><div class="section-label resist-label">Resists — 0.5×</div><div class="matchup-row">${r05.map(t=>chip(t,'½×')).join('')}</div></div>`:'',
    r025.length?`<div class="${cls}"><div class="section-label resist-label">Double resist — 0.25×</div><div class="matchup-row">${r025.map(t=>chip(t,'¼×')).join('')}</div></div>`:'',
    imm.length?`<div class="${cls}"><div class="section-label immune-label">Immune — 0×</div><div class="matchup-row">${imm.map(t=>chip(t,'0×')).join('')}</div></div>`:'',
    notVery.length?`<div class="${cls}"><div class="section-label resist-label">Not very effective — 0.5×</div><div class="matchup-row">${notVery.map(t=>chip(t,'½×')).join('')}</div></div>`:'',
    noEffect.length?`<div class="${cls}"><div class="section-label immune-label">No effect — 0×</div><div class="matchup-row">${noEffect.map(t=>chip(t,'0×')).join('')}</div></div>`:''
  ].filter(Boolean).join('')||'<p style="color:var(--muted);font-size:13px">No notable matchups</p>';
}

/* Tabs */
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else document.querySelectorAll('.tab')[name==='pokemon'?0:1].classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

/* Type browser */
function buildTypeGrid(){
  const grid=document.getElementById('types-grid');
  AT.forEach(type=>{
    const c=TC[type]||{bg:'#888',text:'#fff'};
    const btn=document.createElement('button');
    btn.className='type-btn';
    btn.dataset.type=type;
    btn.innerHTML=`${typeBadgeHTML(type,56)}<span class="type-btn-name" style="color:var(--text)">${type}</span>`;
    btn.addEventListener('click',()=>showType(type,btn));
    grid.appendChild(btn);
  });
}

function showType(type,btn){
  document.querySelectorAll('.type-btn').forEach(b=>{b.classList.remove('selected');b.style.borderColor='';});
  btn.classList.add('selected');
  const c=TC[type]||{bg:'#888',text:'#fff'};
  btn.style.borderColor=c.bg;
  document.getElementById('type-result').innerHTML=`
    <div class="type-result">
      <div class="type-result-hero" style="background:${c.bg}22">
        <div class="type-result-hero-bg" style="background:${c.bg}"></div>
        <div class="type-result-inner">
          ${typeBadgeHTML(type,64)}
          <div>
            <div class="type-result-name">${type.charAt(0).toUpperCase()+type.slice(1)} type</div>
            <div class="type-result-sub">Offensive &amp; defensive matchups</div>
          </div>
        </div>
      </div>
      <div class="type-result-body">
        <div class="section-label" style="margin-bottom:14px">Type matchups</div>
        ${allMatchupsHTML([type],'type-ms')}
      </div>
    </div>`;
  document.getElementById('type-result').scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* Pokémon search */
let allPoke=[],dbt=null;
async function load(){
  try{
    const r=await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000');
    const d=await r.json();
    allPoke=d.results.map(p=>({name:p.name,id:parseInt(p.url.split('/').filter(Boolean).pop())}));
  }catch(e){}
}

async function showPoke(name){
  document.getElementById('card').innerHTML='<div class="loading-state"><div class="loader"></div>Loading Pokémon data...</div>';
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
    const d=await r.json();
    const types=d.types.map(t=>t.type.name);
    const pid=d.id;
    const mainColor=(TC[types[0]]||{bg:'#888'}).bg;
    const gs=(n)=>d.stats.find(s=>s.stat.name===n)?.base_stat||0;
    const stats=[{l:'HP',v:gs('hp'),max:255},{l:'Attack',v:gs('attack'),max:190},{l:'Defense',v:gs('defense'),max:230},{l:'Sp.Atk',v:gs('special-attack'),max:194},{l:'Sp.Def',v:gs('special-defense'),max:230},{l:'Speed',v:gs('speed'),max:200}];
    const total=stats.reduce((a,s)=>a+s.v,0);
    document.getElementById('card').innerHTML=`
      <div class="poke-card">
        <div class="hero" style="background:${mainColor}22">
          <div class="hero-bg" style="background:${mainColor}"></div>
          <div class="hero-circles" style="background:${mainColor}"></div>
          <div class="hero-num">#${String(pid).padStart(4,'0')}</div>
          <div class="hero-layout">
            <div class="hero-info">
              <div class="hero-name">${fname(name)}</div>
              <div class="hero-types">${types.map(pill).join('')}</div>
            </div>
            <img class="hero-sprite" src="${artwork(pid)}" alt="${name}" onerror="this.src='${sprite(pid)}'"/>
          </div>
        </div>
        <div class="poke-body">
          <div class="section-label" style="margin-bottom:14px">Type matchups</div>
          ${allMatchupsHTML(types,'matchup-block')}
          <div class="sep"></div>
          <button class="stats-toggle" onclick="toggleStats(this)">
            <div class="stats-toggle-left">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="opacity:0.5"><rect x="1" y="4" width="2" height="9" rx="1" fill="currentColor"/><rect x="6" y="1" width="2" height="12" rx="1" fill="currentColor"/><rect x="11" y="6" width="2" height="7" rx="1" fill="currentColor"/></svg>
              <span>Base stats</span>
              <div class="stats-total-pill">${total} BST</div>
            </div>
            <svg class="stats-chevron" viewBox="0 0 16 16" fill="none"><path d="M3 6l5 5 5-5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="stats-drawer">
            <div class="stats-drawer-inner">
              <div class="stats-grid">${stats.map(s=>{const pct=Math.round(Math.min(100,s.v/s.max*100));return`<div class="stat-card"><div class="stat-label">${s.l}</div><div class="stat-value">${s.v}</div><div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%;background:${statColor(pct)}"></div></div></div>`;}).join('')}</div>
            </div>
          </div>
        </div>
      </div>`;
  }catch(e){
    document.getElementById('card').innerHTML='<div class="empty-state"><h2>Failed to load</h2><p>Check your connection and try again.</p></div>';
  }
}

function toggleStats(btn){
  const drawer=btn.nextElementSibling;
  const chevron=btn.querySelector('.stats-chevron');
  const isOpen=drawer.classList.contains('open');
  drawer.classList.toggle('open',!isOpen);
  chevron.classList.toggle('open',!isOpen);
}

const searchEl=document.getElementById('search');
const dd=document.getElementById('dropdown');
searchEl.addEventListener('input',()=>{
  clearTimeout(dbt);
  dbt=setTimeout(()=>{
    const q=searchEl.value.toLowerCase().trim();
    if(!q){dd.style.display='none';return;}
    const num=parseInt(q);
    let matches=isNaN(num)?allPoke.filter(p=>p.name.includes(q)).slice(0,20):allPoke.filter(p=>p.id===num);
    if(!matches.length){dd.style.display='none';return;}
    dd.innerHTML=matches.map(p=>`<div class="dd-item" data-name="${p.name}"><img class="dd-img" src="${sprite(p.id)}" alt="${p.name}" loading="lazy"/><span class="dd-name">${fname(p.name)}</span><span class="dd-num">${fid(p.id)}</span></div>`).join('');
    dd.style.display='block';
    dd.querySelectorAll('.dd-item').forEach(el=>{el.addEventListener('click',()=>{searchEl.value=fname(el.dataset.name);dd.style.display='none';showPoke(el.dataset.name);});});
  },140);
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))dd.style.display='none';});
buildTypeGrid();
load();
