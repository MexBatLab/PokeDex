loadList();


/* ══════════════════════════════════════════════════════════════
   SECTION 12: TEAM BUILDER
   Lets users add up to 6 Pokémon to two teams (yours + opponent's),
   then analyzes which of your Pokémon counters each of theirs best.
   ══════════════════════════════════════════════════════════════ */

/* Team data arrays — each entry: {name, id, types, spriteUrl}
   Populated by selectPoke(), cleared by removePoke() */
let myTeam  = [];   // your team (up to 6)
let oppTeam = [];   // opponent's team (up to 6)

/* tbTarget — which team the modal is currently adding to: 'my' or 'opp' */
let tbTarget = null;

let tbDbt = null;  // debounce timer for team builder search

/* openModal(target)
   Opens the fullscreen search modal for adding a Pokémon.
   target = 'my' or 'opp' — which team the selected Pokémon will join.
   Clears the modal search and focuses the input. */
function openModal(target) {
  tbTarget = target;
  document.getElementById('tb-modal').style.display = 'flex';
  document.getElementById('tb-search-input').value = '';
  document.getElementById('tb-search-results').innerHTML = '';
  setTimeout(() => document.getElementById('tb-search-input').focus(), 50);
}

/* closeModal()
   Hides the search modal and clears tbTarget. */
function closeModal() {
  document.getElementById('tb-modal').style.display = 'none';
  tbTarget = null;
}

/* closeModalOutside(e)
   Called on clicks on the modal backdrop.
   Only closes if the click was on the dark overlay itself,
   not on the inner search box. */
function closeModalOutside(e) {
  if(e.target === document.getElementById('tb-modal')) closeModal();
}

/* Team builder modal search input listener.
   Same logic as the main search — debounced, filters allPoke[].
   Results are clickable and call selectPoke(). */
document.getElementById('tb-search-input').addEventListener('input', function() {
  clearTimeout(tbDbt);
  const q = this.value.toLowerCase().trim();
  if(!q) { document.getElementById('tb-search-results').innerHTML = ''; return; }
  tbDbt = setTimeout(() => {
    const num = parseInt(q);
    const matches = isNaN(num)
      ? allPoke.filter(p => p.name.includes(q)).slice(0, 25)
      : allPoke.filter(p => p.id === num);
    document.getElementById('tb-search-results').innerHTML = matches.map(p =>
      `<div class="tb-result-item" onclick="selectPoke('${p.name}',${p.id})">
        <img class="tb-result-img" src="${sprite(p.id)}" alt="${p.name}" loading="lazy"/>
        <span class="tb-result-name">${fname(p.name)}</span>
        <span class="tb-result-num">${fid(p.id)}</span>
      </div>`
    ).join('');
  }, 120);
});

/* Close modal on Escape key */
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

/* selectPoke(name, id)
   Called when a Pokémon is clicked in the team builder modal.
   - Saves tbTarget BEFORE closing the modal (closeModal sets tbTarget=null)
   - Prevents adding duplicates or exceeding 6 slots
   - Fetches the Pokémon's types from PokéAPI
   - Adds to the appropriate team array and re-renders the slots */
async function selectPoke(name, id) {
  const target = tbTarget;  // save before closeModal() nulls it
  const team = target === 'my' ? myTeam : oppTeam;
  if(team.length >= 6) return;        // max 6 per team
  if(team.find(p => p.name === name)) return;  // no duplicates
  closeModal();
  try {
    const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
    const d = await r.json();
    const types = d.types.map(t => t.type.name);
    const pid = d.id;
    const abilities = d.abilities.map(a => a.ability.name);
    team.push({name, id: pid, types, abilities, spriteUrl: sprite(pid)});
    renderSlots(target);  // update the slot display
  } catch(e) { console.error(e); }
}

/* removePoke(target, name)
   Removes a Pokémon from the specified team by name.
   Also clears the analysis results since they're now outdated. */
function removePoke(target, name) {
  if(target === 'my') myTeam  = myTeam.filter(p => p.name !== name);
  else                oppTeam = oppTeam.filter(p => p.name !== name);
  renderSlots(target);
  _resetMatchups();
}

/* renderSlots(target)
   Re-renders the slot display for the given team ('my' or 'opp').
   Each filled slot shows: sprite, name, type pills, remove button.
   Disables the "+ Add Pokémon" button when the team is full (6). */
function renderSlots(target) {
  const team = target === 'my' ? myTeam : oppTeam;
  const container = document.getElementById(target + '-slots');
  const addBtn = document.getElementById(target + '-add-btn');
  container.innerHTML = team.map(p => `
    <div class="tb-slot filled">
      <img class="tb-slot-img" src="${p.spriteUrl}" alt="${p.name}"/>
      <div style="flex:1;min-width:0">
        <div class="tb-slot-name">${fname(p.name)}</div>
        <div class="tb-slot-types">
          ${p.types.map(t => `<span class="tb-slot-type" style="background:${(TC[t]||{bg:'#888'}).bg}">${t}</span>`).join('')}
        </div>
      </div>
      <button class="tb-slot-remove" onclick="removePoke('${target}','${p.name}')" title="Remove">×</button>
    </div>`
  ).join('');
  addBtn.disabled = team.length >= 6;
}

];

/* getAbilityNotes(myPoke, oppPoke)
   Checks all ABILITY_RULES for interactions between myPoke and oppPoke.
   Returns array of {note, kind} objects for relevant interactions.
   Deduplicates so the same note doesn't appear twice. */
function getAbilityNotes(myPoke, oppPoke) {
  const notes = [];
  const seen = new Set();
  const myAbs = myPoke.abilities || [];
  const oppAbs = oppPoke.abilities || [];
  const myTypes = myPoke.types || [];
  const oppTypes = oppPoke.types || [];

  for(const rule of ABILITY_RULES) {
    // Check if opponent has the trigger ability
    if(rule.oppAbility && !oppAbs.includes(rule.oppAbility)) continue;

    // Check if the opponent is the required type (for type-absorbing ability notes)
    if(rule.oppTypes && !rule.oppTypes.some(t => oppTypes.includes(t))) continue;

    // Check if my Pokémon has any of the required abilities
    if(rule.myAbilities) {
      const match = rule.myAbilities.find(a => myAbs.includes(a));
      if(!match) continue;
    }

    // Check if my Pokémon has the required type
    if(rule.myTypes) {
      if(!rule.myTypes.some(t => myTypes.includes(t))) continue;
    }

    // Deduplicate
    const key = rule.note;
    if(seen.has(key)) continue;
    seen.add(key);
    notes.push({note: rule.note, kind: rule.kind});
  }
  return notes;
}

/* ── Team Builder Analysis ─────────────────────────────────────
   battleScore and analyzeMatchups do the actual counter math.   */

/* battleScore(myTypes, oppTypes)
   Returns the highest offensive multiplier your Pokémon's types
   can achieve against the opponent's Pokémon's types.

   Example: your Charizard (Fire/Flying) vs opponent's Scizor (Bug/Steel)
   Fire hits Bug for 0.5× (Bug resists Fire) but...
   Actually Fire hits Steel for 2×. So best = 2× → "Strong". */
function battleScore(myTypes, oppTypes) {
  const oppMult = calcDefMult(oppTypes);  // how each attack type does against opponent
  return Math.max(...myTypes.map(t => oppMult[t] || 1));
}

/* ── AI Battle Analysis ──────────────────────────────────────────────── */

const _AI_EP = ['https://api.gr','oq.com/open','ai/v1/chat/','completions'].join('');

function closeAiPanel() {
  document.getElementById('ai-results').innerHTML = '';
  const btn = document.getElementById('ai-btn');
  btn.textContent = '✦ AI Battle Analysis';
  btn.disabled = false;
}

async function runAiAnalysis() {
  const container = document.getElementById('ai-results');

  if (!myTeam.length || !oppTeam.length) {
    container.innerHTML = '<div class="tb-empty-team">Add at least one Pokémon to each team first.</div>';
    return;
  }

  const btn = document.getElementById('ai-btn');
  btn.disabled = true;
  btn.textContent = 'Analyzing…';

  container.innerHTML = `<div class="ai-panel">
    <div class="ai-panel-header">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1.5L9.8 6.2H14.5L10.6 8.9L12.1 13.5L8 10.8L3.9 13.5L5.4 8.9L1.5 6.2H6.2L8 1.5Z" fill="currentColor"/></svg>
      AI Battle Analysis
      <button onclick="closeAiPanel()">×</button>
    </div>
    <div class="ai-panel-body" id="ai-stream-body">
      <div class="ai-thinking-dots"><span></span><span></span><span></span></div>
    </div>
  </div>`;

  try {
    const fmt = t => t.map(p=>`${p.name}(${p.types.join('/')})[${p.abilities.join(',')}]`).join(', ');
    const prompt = `Pokemon battle matchup.\nTeam 1: ${fmt(myTeam)}\nTeam 2: ${fmt(oppTeam)}\n\n## How Team 2 walls Team 1\n3-4 bullets: how Team 2 defensively stops Team 1. Name exact pokemon, abilities, types. Start each with ▶\n\n## How Team 1 breaks Team 2\n3-4 bullets: how Team 1 offensively beats Team 2. Name exact pokemon, abilities, types. Start each with ▶\n\nBe specific and concise.`;

    const resp = await fetch(_AI_EP, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _resolveTypeChart() },
      body: JSON.stringify({
        model: 'llama-3.1-8b-instant',
        max_tokens: 1024,
        stream: true,
        messages: [
          { role: 'system', content: 'You are a competitive Pokemon analyst. Be specific and concise. Use ▶ for bullets.' },
          { role: 'user', content: prompt }
        ]
      })
    });

    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      const msg = errData.error?.message || '';
      if (resp.status === 401 || msg.includes('expired') || msg.includes('invalid')) throw new Error('AI key expired — contact the site owner.');
      if (resp.status === 429) throw new Error('Too many requests — please wait a moment.');
      throw new Error(`Error ${resp.status}`);
    }

    const body = document.getElementById('ai-stream-body');
    body.textContent = '';
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ') || line.slice(6).trim() === '[DONE]') continue;
        try {
          const token = JSON.parse(line.slice(6))?.choices?.[0]?.delta?.content;
          if (token) body.textContent += token;
        } catch {}
      }
    }
  } catch (err) {
    const body = document.getElementById('ai-stream-body');
    if (body) body.innerHTML = `<span style="color:var(--red)">${err.message}</span>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '✦ AI Battle Analysis';
  }
}

/* scoreLabel(score)
   Converts a numeric multiplier score to a CSS class and display label.
   Used to color-code the score badges in the results. */
function scoreLabel(score) {
  if(score >= 4) return {cls:'tb-score-great', txt:'4× Super!'};
  if(score >= 2) return {cls:'tb-score-great', txt:'2× Strong'};
  if(score === 1) return {cls:'tb-score-neutral', txt:'Neutral'};
  if(score <= 0) return {cls:'tb-score-bad', txt:'No effect'};
  return {cls:'tb-score-good', txt:'0.5× Weak'};
}

/* analyzeMatchups()
   The main analysis function triggered by "Analyze matchups" button.

   For each opponent Pokémon:
   - Scores every one of your Pokémon against it using battleScore()
   - Sorts your team best-to-worst
   - Renders a result card showing the ranked list

   Results are injected into #tb-results. */
let _matchupsVisible = false;
function analyzeMatchups() {
  const results = document.getElementById('tb-results');
  const btn = document.getElementById('analyze-btn');

  // Toggle off if already showing
  if (_matchupsVisible) {
    results.innerHTML = '';
    _matchupsVisible = false;
    btn.textContent = 'Type Matchups';
    return;
  }

  // Validation — need at least one Pokémon on each team
  if(!myTeam.length || !oppTeam.length) {
    results.innerHTML = '<div class="tb-empty-team">Add at least one Pokémon to each team first.</div>';
    return;
  }
  _matchupsVisible = true;
  btn.textContent = 'Hide Matchups';

  results.innerHTML = '<div class="tb-results">' +
    oppTeam.map(opp => {
      // Score and sort all your Pokémon against this opponent
      const ranked = [...myTeam]
        .map(my => ({...my, score: battleScore(my.types, opp.types)}))
        .sort((a, b) => b.score - a.score);

      const sl = scoreLabel(ranked[0].score);  // best available counter score

      // Build the ranked counter rows with ability notes
      const countersHTML = ranked.map((my, i) => {
        const s = scoreLabel(my.score);
        const abNotes = getAbilityNotes(my, opp);
        const abNotesHTML = abNotes.map(n =>
          `<div class="ab-note ab-note-${n.kind}">
            <span class="ab-note-icon">${n.kind==='good'?'✦':n.kind==='warn'?'⚠':'◆'}</span>
            <span>${n.note}</span>
          </div>`
        ).join('');
        return `<div class="tb-counter-row" style="flex-direction:column;align-items:stretch;padding:10px 12px">
          <div style="display:flex;align-items:center;gap:10px">
            <span class="tb-counter-rank">${i+1}</span>
            <img class="tb-counter-img" src="${my.spriteUrl}" alt="${my.name}"/>
            <span class="tb-counter-name">${fname(my.name)}</span>
            <span class="tb-counter-score ${s.cls}">${s.txt}</span>
          </div>
          ${abNotesHTML}
        </div>`;
      }).join('');

      // Build the opponent result card
      return `<div class="tb-result-card">
        <div class="tb-result-header" style="background:${(TC[opp.types[0]]||{bg:'#888'}).bg}22">
          <img src="${opp.spriteUrl}" alt="${opp.name}"/>
          <div class="tb-result-header-info">
            <div class="tb-result-header-name">${fname(opp.name)}</div>
            <div class="tb-result-header-types">
              ${opp.types.map(t=>`<span class="tb-slot-type" style="background:${(TC[t]||{bg:'#888'}).bg}">${t}</span>`).join('')}
            </div>
          </div>
          <span class="tb-counter-score ${sl.cls}" style="align-self:center">Best: ${sl.txt}</span>
        </div>
        <div class="tb-counters">
          <div class="section-label" style="margin-bottom:6px">Your team ranked</div>
          ${countersHTML}
        </div>
      </div>`;
    }).join('') + '</div>';

  // Scroll to the results after rendering
  document.getElementById('tb-results').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function _resetMatchups() {
  _matchupsVisible = false;
  document.getElementById('tb-results').innerHTML = '';
  document.getElementById('analyze-btn').textContent = 'Type Matchups';
}

/* randomizeTeam(target)
   Picks 6 random Pokémon from allPoke for 'my', 'opp', or 'both' teams.
   Fetches their data from PokéAPI in parallel, then renders the slots.
   Shows a ↻ spinner on the button while loading. */
let _randomizing = false;
async function randomizeTeam(target) {
  if (!allPoke.length || _randomizing) return;
  _randomizing = true;
  _resetMatchups();
  document.getElementById('ai-results').innerHTML = '';

  // Button state helpers
  const setLoading = (id, iconId, loading) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.disabled = loading;
    document.getElementById(iconId).className = loading ? 'tb-rand-spin' : '';
    document.getElementById(iconId).textContent = loading ? '↻' : '⚄';
  };

  if (target === 'my' || target === 'both') setLoading('rand-my-btn', 'rand-my-icon', true);
  if (target === 'opp' || target === 'both') setLoading('rand-opp-btn', 'rand-opp-icon', true);
  if (target === 'both') setLoading('rand-both-btn', 'rand-both-icon', true);

  const pickRandom = () => [...allPoke].sort(() => Math.random() - 0.5).slice(0, 6);

  const fetchTeam = async (picks) => {
    const settled = await Promise.allSettled(picks.map(async p => {
      const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${p.name}`);
      const d = await r.json();
      return {
        name: p.name,
        id: d.id,
        types: d.types.map(t => t.type.name),
        abilities: d.abilities.map(a => a.ability.name),
        spriteUrl: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${d.id}.png`
      };
    }));
    return settled.filter(r => r.status === 'fulfilled').map(r => r.value);
  };

  try {
    if (target === 'both') {
      const [myEntries, oppEntries] = await Promise.all([fetchTeam(pickRandom()), fetchTeam(pickRandom())]);
      myTeam = myEntries;
      oppTeam = oppEntries;
    } else if (target === 'my') {
      myTeam = await fetchTeam(pickRandom());
    } else {
      oppTeam = await fetchTeam(pickRandom());
    }
    renderSlots('my');
    renderSlots('opp');
  } catch(e) {
    console.error('Randomize failed', e);
  } finally {
    _randomizing = false;
    setLoading('rand-my-btn', 'rand-my-icon', false);
    setLoading('rand-opp-btn', 'rand-opp-icon', false);
    setLoading('rand-both-btn', 'rand-both-icon', false);
  }
}

</script>
