<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pokédex — Battle Helper</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  /* ── DARK THEME (default) ── */
  :root, [data-theme="dark"] {
    --red: #E63946;
    --bg: #0d0d0f;
    --card: #16161a;
    --surface: #1e1e24;
    --surface2: #26262e;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.16);
    --text: #f0f0f5;
    --muted: rgba(240,240,245,0.45);
    --dot-color: rgba(255,255,255,0.04);
    --stat-track: rgba(255,255,255,0.08);
    --hero-num: rgba(255,255,255,0.4);
    --toggle-bg: #26262e;
    --toggle-icon: #f0f0f5;
    --shadow: rgba(0,0,0,0.4);
    --immune-col: #a855f7;
    --resist-col: #22d3ee;
    --weak-col: #fb923c;
  }

  /* ── LIGHT THEME ── */
  [data-theme="light"] {
    --bg: #f2f2f7;
    --card: #ffffff;
    --surface: #e8e8ef;
    --surface2: #dcdce5;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.18);
    --text: #111118;
    --muted: rgba(17,17,24,0.45);
    --dot-color: rgba(0,0,0,0.035);
    --stat-track: rgba(0,0,0,0.07);
    --hero-num: rgba(255,255,255,0.55);
    --toggle-bg: #e8e8ef;
    --toggle-icon: #111118;
    --shadow: rgba(0,0,0,0.15);
    --immune-col: #7c3aed;
    --resist-col: #0891b2;
    --weak-col: #ea580c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: radial-gradient(circle, var(--dot-color) 1px, transparent 1px);
    background-size: 28px 28px; pointer-events: none; z-index: 0;
  }

  .page { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  /* ── Header ── */
  .site-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
  .logo { display: flex; align-items: center; gap: 14px; }
  .pokeball {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--surface); border: 1.5px solid var(--border);
    position: relative; overflow: hidden; flex-shrink: 0;
    animation: spin-idle 8s linear infinite;
    transition: background 0.3s, border-color 0.3s;
  }
  @keyframes spin-idle { 0%,85%,100%{transform:rotate(0deg)} 90%{transform:rotate(15deg)} 95%{transform:rotate(-8deg)} }
  .pb-top { position: absolute; top: 0; left: 0; right: 0; height: 50%; background: var(--red); }
  .pb-band { position: absolute; top: calc(50% - 2px); left: 0; right: 0; height: 4px; background: rgba(0,0,0,0.35); }
  .pb-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--bg); border: 2px solid rgba(0,0,0,0.3); z-index: 2;
    transition: background 0.3s;
  }
  .pb-center::after {
    content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 5px; height: 5px; border-radius: 50%; background: var(--text); opacity: 0.4;
  }
  .logo-text h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; color: var(--text); }
  .logo-text h1 span { color: var(--red); }
  .logo-text p { font-size: 12px; color: var(--muted); font-weight: 400; margin-top: 3px; }

  /* Header right side */
  .header-right { display: flex; align-items: center; gap: 10px; }
  .gen-badge {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 100px; padding: 6px 14px; font-size: 12px;
    font-weight: 500; color: var(--muted);
    transition: background 0.3s, border-color 0.3s;
  }
  .gen-badge span { color: var(--red); font-weight: 600; }

  /* ── Theme toggle ── */
  .theme-toggle {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--toggle-bg); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .theme-toggle:hover { border-color: var(--border-hover); transform: scale(1.08); }
  .theme-toggle svg { width: 17px; height: 17px; fill: var(--toggle-icon); transition: fill 0.3s; }
  .icon-sun { display: none; }
  .icon-moon { display: block; }
  [data-theme="light"] .icon-sun { display: block; }
  [data-theme="light"] .icon-moon { display: none; }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface); border-radius: 20px; padding: 5px; margin-bottom: 1.75rem;
    transition: background 0.3s;
  }
  .tab {
    flex: 1; padding: 10px; border-radius: 14px; border: none;
    background: transparent; color: var(--muted);
    font-family: 'Outfit', system-ui, sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .tab.active { background: var(--card); color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Search ── */
  .search-wrap { position: relative; margin-bottom: 0.75rem; }
  .search-box {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 0 20px; transition: border-color 0.2s, background 0.3s;
  }
  .search-box:focus-within { border-color: var(--red); box-shadow: 0 0 0 3px rgba(230,57,70,0.12); }
  .search-box svg { flex-shrink: 0; opacity: 0.35; color: var(--text); }
  #search {
    flex: 1; background: none; border: none; outline: none;
    padding: 16px 0; font-size: 16px; font-family: 'Outfit', system-ui, sans-serif; color: var(--text);
  }
  #search::placeholder { color: var(--muted); }
  .search-hint { font-size: 12px; color: var(--muted); margin-top: 8px; padding: 0 4px; }

  /* ── Dropdown ── */
  #dropdown {
    display: none; position: absolute; top: calc(100% + 8px); left: 0; right: 0;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    z-index: 200; overflow: hidden; max-height: 280px; overflow-y: auto;
    transition: background 0.3s;
  }
  #dropdown::-webkit-scrollbar { width: 4px; }
  #dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .dd-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .dd-item:last-child { border-bottom: none; }
  .dd-item:hover { background: var(--surface); }
  .dd-img { width: 40px; height: 40px; image-rendering: pixelated; }
  .dd-name { flex: 1; font-size: 14px; font-weight: 500; text-transform: capitalize; color: var(--text); }
  .dd-num { font-size: 11px; color: var(--muted); }

  /* ── Empty / loading ── */
  #card { margin-top: 0.5rem; }
  .empty-state {
    text-align: center; padding: 4rem 2rem;
    border: 1.5px dashed var(--border); border-radius: 20px; background: var(--surface);
    transition: background 0.3s;
  }
  .empty-icon { width: 64px; height: 64px; border-radius: 50%; background: var(--surface2); margin: 0 auto 1.25rem; position: relative; overflow: hidden; transition: background 0.3s; }
  .empty-state h2 { font-size: 17px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; color: var(--muted); }
  .loading-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }
  .loader { width: 32px; height: 32px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--red); animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Pokémon card ── */
  .poke-card { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); background: var(--card); animation: fadeUp 0.3s ease; transition: background 0.3s, border-color 0.3s; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .hero { position: relative; padding: 2.5rem 2rem 1.5rem; overflow: hidden; min-height: 200px; }
  .hero-bg { position: absolute; inset: 0; opacity: 0.15; }
  [data-theme="light"] .hero-bg { opacity: 0.25; }
  .hero-circles { position: absolute; right: -40px; top: -40px; width: 260px; height: 260px; border-radius: 50%; opacity: 0.08; }
  .hero-circles::after { content: ''; position: absolute; inset: 30px; border-radius: 50%; background: rgba(255,255,255,0.5); }
  .hero-num { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--hero-num); text-transform: uppercase; margin-bottom: 6px; position: relative; z-index: 2; }
  .hero-layout { display: flex; align-items: flex-end; justify-content: space-between; position: relative; z-index: 2; gap: 1rem; }
  .hero-info { flex: 1; }
  .hero-name { font-size: 36px; font-weight: 800; text-transform: capitalize; line-height: 1; letter-spacing: -1px; color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,0.35); margin-bottom: 12px; }
  .hero-types { display: flex; gap: 7px; flex-wrap: wrap; }
  .type-pill { padding: 5px 14px; border-radius: 100px; font-size: 12px; font-weight: 600; text-transform: capitalize; letter-spacing: 0.03em; border: 1px solid rgba(255,255,255,0.2); }
  .hero-sprite { width: 150px; height: 150px; image-rendering: pixelated; filter: drop-shadow(0 8px 24px var(--shadow)); flex-shrink: 0; transition: transform 0.3s ease; }
  .hero-sprite:hover { transform: translateY(-6px) scale(1.05); }

  .poke-body { padding: 1.75rem 2rem; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.75rem; }
  .stat-card { background: var(--surface); border-radius: 12px; padding: 12px 14px; border: 1px solid var(--border); transition: background 0.3s, border-color 0.3s; }
  .stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-bar-track { height: 3px; background: var(--stat-track); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 3px; }
  .sep { height: 1px; background: var(--border); margin: 1.75rem 0; }
  .matchup-block { margin-bottom: 1.25rem; }
  .matchup-block:last-child { margin-bottom: 0; }
  .matchup-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .m-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 100px; font-size: 12px; font-weight: 600; text-transform: capitalize; border: 1px solid rgba(0,0,0,0.15); }
  .m-mult { font-size: 10px; font-weight: 700; opacity: 0.75; background: rgba(0,0,0,0.2); padding: 1px 5px; border-radius: 100px; }
  .immune-label { color: var(--immune-col); }
  .resist-label { color: var(--resist-col); }
  .weak-label { color: var(--weak-col); }
  .dblweak-label { color: var(--red); }
  .total-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 4px 12px 4px 10px; font-size: 12px; color: var(--muted); margin-top: 1rem; transition: background 0.3s; }
  .total-badge strong { color: var(--text); font-weight: 700; }

  /* ── Type browser ── */
  .type-intro { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; padding: 0 2px; }
  .types-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  @media(min-width:500px){ .types-grid { grid-template-columns: repeat(6, 1fr); } }
  .type-btn {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px;
    padding: 14px 8px; cursor: pointer; transition: all 0.18s;
    font-family: 'Outfit', system-ui, sans-serif;
  }
  .type-btn:hover { background: var(--surface2); transform: translateY(-2px); border-color: var(--border-hover); }
  .type-btn.selected { transform: translateY(-2px); }
  .type-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .type-btn-name { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
  .type-result { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; animation: fadeUp 0.25s ease; transition: background 0.3s; }
  .type-result-hero { padding: 1.5rem 2rem; position: relative; overflow: hidden; }
  .type-result-hero-bg { position: absolute; inset: 0; opacity: 0.18; }
  [data-theme="light"] .type-result-hero-bg { opacity: 0.28; }
  .type-result-inner { position: relative; z-index: 2; display: flex; align-items: center; gap: 16px; }
  .type-result-icon { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.25); }
  .type-result-name { font-size: 28px; font-weight: 800; text-transform: capitalize; color: #fff; letter-spacing: -0.5px; text-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  .type-result-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 3px; }
  .type-result-body { padding: 1.5rem 2rem; }
  .type-ms { margin-bottom: 1.25rem; }
  .type-ms:last-child { margin-bottom: 0; }
</style>
</head>

<div class="page">

  <header class="site-header">

        </svg>

  <div class="tabs">

  <div id="tab-pokemon" class="tab-panel active">

        <div class="empty-icon">
          <div class="pb-top"></div><div class="pb-band"></div><div class="pb-center"></div>
        </div>
        <h2>Search for a Pokémon</h2>
        <p>See type matchups, base stats, and weaknesses</p>
      </div>
    </div>
  </div>

  <!-- TYPES TAB -->
  <div id="tab-types" class="tab-panel">
    <p class="type-intro">Tap any type to see its defensive matchups — what beats it, what it resists, and what it's immune to.</p>
    <div class="types-grid" id="types-grid"></div>
    <div id="type-result"></div>
  </div>

</div>

  ice:{fire:0.5,water:0.5,grass:2,ice:0.5,ground:2,flying:2,dragon:2,steel:0.5},
  fighting:{normal:2,ice:2,poison:0.5,flying:0.5,psychic:0.5,bug:0.5,rock:2,ghost:0,dark:2,steel:2,fairy:0.5},
  poison:{grass:2,poison:0.5,ground:0.5,rock:0.5,ghost:0.5,steel:0,fairy:2},
  ground:{fire:2,electric:2,grass:0.5,poison:2,flying:0,bug:0.5,rock:2,steel:2},
  flying:{electric:0.5,grass:2,fighting:2,bug:2,rock:0.5,steel:0.5},
  psychic:{fighting:2,poison:2,psychic:0.5,dark:0,steel:0.5},
  bug:{fire:0.5,grass:2,fighting:0.5,poison:0.5,flying:0.5,psychic:2,ghost:0.5,dark:2,steel:0.5,fairy:0.5},
  rock:{fire:2,ice:2,fighting:0.5,ground:0.5,flying:2,bug:2,steel:0.5},
  ghost:{normal:0,psychic:2,ghost:2,dark:0.5},dragon:{dragon:2,steel:0.5,fairy:0},
  dark:{fighting:0.5,psychic:2,ghost:2,dark:0.5,fairy:0.5},
  steel:{fire:0.5,water:0.5,electric:0.5,ice:2,rock:2,steel:0.5,fairy:2},
  fairy:{fire:0.5,fighting:2,poison:0.5,dragon:2,dark:2,steel:0.5}
};
const AT=Object.keys(CHART);

function calcMult(types){
  const m={};AT.forEach(t=>m[t]=1);
  types.forEach(def=>{AT.forEach(atk=>{const c=CHART[atk]||{};m[atk]*=(c[def]!==undefined?c[def]:1);});});
  return m;
}
function pill(t){const c=TC[t]||{bg:'#888',text:'#fff'};return`<span class="type-pill" style="background:${c.bg};color:${c.text}">${t}</span>`;}
function chip(t,mult){const c=TC[t]||{bg:'#888',text:'#fff'};const lbl=mult===0?'0×':`${mult}×`;return`<span class="m-chip" style="background:${c.bg};color:${c.text}">${t}<span class="m-mult">${lbl}</span></span>`;}
function statColor(p){if(p>75)return'#22d3ee';if(p>50)return'#4ade80';if(p>30)return'#facc15';return'#f87171';}
function fname(n){return n.split('-').map(p=>p[0].toUpperCase()+p.slice(1)).join(' ');}
function fid(id){return'#'+String(id).padStart(4,'0');}
function artwork(id){return`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;}
function sprite(id){return`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;}

function matchupHTML(mult,cls){
  const w4=AT.filter(t=>mult[t]===4),w2=AT.filter(t=>mult[t]===2),r05=AT.filter(t=>mult[t]===0.5),r025=AT.filter(t=>mult[t]===0.25),imm=AT.filter(t=>mult[t]===0);
  return[
    w4.length?`<div class="${cls}"><div class="section-label dblweak-label">Double weak — 4×</div><div class="matchup-row">${w4.map(t=>chip(t,4)).join('')}</div></div>`:'',
    w2.length?`<div class="${cls}"><div class="section-label weak-label">Weak — 2×</div><div class="matchup-row">${w2.map(t=>chip(t,2)).join('')}</div></div>`:'',
    r05.length?`<div class="${cls}"><div class="section-label resist-label">Resists — 0.5×</div><div class="matchup-row">${r05.map(t=>chip(t,0.5)).join('')}</div></div>`:'',
    r025.length?`<div class="${cls}"><div class="section-label resist-label">Double resist — 0.25×</div><div class="matchup-row">${r025.map(t=>chip(t,0.25)).join('')}</div></div>`:'',
    imm.length?`<div class="${cls}"><div class="section-label immune-label">Immune — 0×</div><div class="matchup-row">${imm.map(t=>chip(t,0)).join('')}</div></div>`:''
  ].filter(Boolean).join('')||'<p style="color:var(--muted);font-size:13px">No notable matchups</p>';
}

/* Theme toggle */
function toggleTheme(){
  const html=document.documentElement;
  const next=html.dataset.theme==='dark'?'light':'dark';
  html.dataset.theme=next;
  localStorage.setItem('poke-theme',next);
}
(function(){
  const saved=localStorage.getItem('poke-theme');
  if(saved) document.documentElement.dataset.theme=saved;
  else if(window.matchMedia('(prefers-color-scheme: light)').matches) document.documentElement.dataset.theme='light';
})();

/* Home reset */
function goHome(){
  document.getElementById('search').value='';
  document.getElementById('dropdown').style.display='none';
  document.getElementById('card').innerHTML=`
    <div class="empty-state">
      <div class="empty-icon">
        <div class="pb-top"></div><div class="pb-band"></div><div class="pb-center"></div>
      </div>
      <h2>Search for a Pokémon</h2>
      <p>See type matchups, base stats, and weaknesses</p>
    </div>`;
  switchTab('pokemon');
}

/* Tabs */
function switchTab(name, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else document.querySelectorAll('.tab')[name==='pokemon'?0:1].classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

/* Type browser */
function buildTypeGrid(){
  const grid=document.getElementById('types-grid');
  AT.forEach(type=>{
    const c=TC[type]||{bg:'#888',text:'#fff'};
    const btn=document.createElement('button');
    btn.className='type-btn';
    btn.dataset.type=type;
    btn.innerHTML=`<div class="type-icon" style="background:${c.bg}"><svg viewBox="0 0 28 28" width="22" height="22" fill="${c.text}" xmlns="http://www.w3.org/2000/svg">${TYPE_SVG[type]||''}</svg></div><span class="type-btn-name" style="color:${c.bg}">${type}</span>`;
    btn.addEventListener('click',()=>showType(type,btn));
    grid.appendChild(btn);
  });
}
function showType(type,btn){
  document.querySelectorAll('.type-btn').forEach(b=>{b.classList.remove('selected');b.style.borderColor='';});
  btn.classList.add('selected');
  const c=TC[type]||{bg:'#888',text:'#fff'};
  btn.style.borderColor=c.bg;
  const mult=calcMult([type]);
  document.getElementById('type-result').innerHTML=`
    <div class="type-result">
      <div class="type-result-hero" style="background:${c.bg}22">
        <div class="type-result-hero-bg" style="background:${c.bg}"></div>
        <div class="type-result-inner">
          <div class="type-result-icon" style="background:${c.bg}">
            <svg viewBox="0 0 28 28" width="30" height="30" fill="${c.text}" xmlns="http://www.w3.org/2000/svg">${TYPE_SVG[type]||''}</svg>
          </div>
          <div>
            <div class="type-result-name">${type.charAt(0).toUpperCase()+type.slice(1)} type</div>
            <div class="type-result-sub">Defensive matchups as a solo type</div>
          </div>
        </div>
      </div>
      <div class="type-result-body">${matchupHTML(mult,'type-ms')}</div>
    </div>`;
  document.getElementById('type-result').scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* Pokémon search */
let allPoke=[],dbt=null;
async function load(){
  try{const r=await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000');const d=await r.json();allPoke=d.results.map((p,i)=>({name:p.name,id:i+1}));}catch(e){}
}
async function showPoke(name){
  document.getElementById('card').innerHTML='<div class="loading-state"><div class="loader"></div>Loading Pokémon data...</div>';
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);const d=await r.json();
    const types=d.types.map(t=>t.type.name);const pid=d.id;
    const mainColor=(TC[types[0]]||{bg:'#888'}).bg;
    const mult=calcMult(types);
    const gs=(n)=>d.stats.find(s=>s.stat.name===n)?.base_stat||0;
    const stats=[{l:'HP',v:gs('hp'),max:255},{l:'Attack',v:gs('attack'),max:190},{l:'Defense',v:gs('defense'),max:230},{l:'Sp.Atk',v:gs('special-attack'),max:194},{l:'Sp.Def',v:gs('special-defense'),max:230},{l:'Speed',v:gs('speed'),max:200}];
    const total=stats.reduce((a,s)=>a+s.v,0);
    document.getElementById('card').innerHTML=`
      <div class="poke-card">
        <div class="hero" style="background:${mainColor}22">
          <div class="hero-bg" style="background:${mainColor}"></div>
          <div class="hero-circles" style="background:${mainColor}"></div>
          <div class="hero-num">${fid(pid)}</div>
          <div class="hero-layout">
            <div class="hero-info">
              <div class="hero-name">${fname(name)}</div>
              <div class="hero-types">${types.map(pill).join('')}</div>
            </div>
            <img class="hero-sprite" src="${artwork(pid)}" alt="${name}" onerror="this.src='${sprite(pid)}'"/>
          </div>
        </div>
        <div class="poke-body">
          <div class="section-label">Base stats</div>
          <div class="stats-grid">${stats.map(s=>{const pct=Math.round(Math.min(100,s.v/s.max*100));return`<div class="stat-card"><div class="stat-label">${s.l}</div><div class="stat-value">${s.v}</div><div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%;background:${statColor(pct)}"></div></div></div>`;}).join('')}</div>
          <div class="total-badge">Base stat total <strong>${total}</strong></div>
          <div class="sep"></div>
          <div class="section-label" style="margin-bottom:14px">Type matchups</div>
          ${matchupHTML(mult,'matchup-block')}
        </div>
      </div>`;
  }catch(e){document.getElementById('card').innerHTML='<div class="empty-state"><h2>Failed to load</h2><p>Check your connection and try again.</p></div>';}
}

const searchEl=document.getElementById('search');
const dd=document.getElementById('dropdown');
searchEl.addEventListener('input',()=>{
  clearTimeout(dbt);
  dbt=setTimeout(()=>{
    const q=searchEl.value.toLowerCase().trim();
    if(!q){dd.style.display='none';return;}
    const num=parseInt(q);
    let matches=isNaN(num)?allPoke.filter(p=>p.name.includes(q)).slice(0,20):allPoke.filter(p=>p.id===num);
    if(!matches.length){dd.style.display='none';return;}
    dd.innerHTML=matches.map(p=>`<div class="dd-item" data-name="${p.name}"><img class="dd-img" src="${sprite(p.id)}" alt="${p.name}" loading="lazy"/><span class="dd-name">${fname(p.name)}</span><span class="dd-num">${fid(p.id)}</span></div>`).join('');
    dd.style.display='block';
    dd.querySelectorAll('.dd-item').forEach(el=>{el.addEventListener('click',()=>{searchEl.value=fname(el.dataset.name);dd.style.display='none';showPoke(el.dataset.name);});});
  },140);
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))dd.style.display='none';});
buildTypeGrid();
load();
</script>
</body>
</html>
