<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Pokédex"/>
<meta name="theme-color" content="#0d0d0f"/>
<title>Pokédex — Battle Helper</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root,[data-theme="dark"]{--red:#E63946;--bg:#0d0d0f;--card:#16161a;--surface:#1e1e24;--surface2:#26262e;--border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.16);--text:#f0f0f5;--muted:rgba(240,240,245,0.45);--dot-color:rgba(255,255,255,0.04);--stat-track:rgba(255,255,255,0.08);--hero-num:rgba(255,255,255,0.4);--toggle-bg:#26262e;--toggle-icon:#f0f0f5;--shadow:rgba(0,0,0,0.4);--immune-col:#a855f7;--resist-col:#22d3ee;--weak-col:#fb923c;--strong-col:#4ade80;}
  [data-theme="light"]{--bg:#e8e8f0;--card:#f8f8fc;--surface:#d8d8e4;--surface2:#c8c8d8;--border:rgba(0,0,0,0.13);--border-hover:rgba(0,0,0,0.25);--text:#0a0a14;--muted:rgba(10,10,20,0.55);--dot-color:rgba(0,0,0,0.045);--stat-track:rgba(0,0,0,0.1);--hero-num:rgba(255,255,255,0.6);--toggle-bg:#d0d0de;--toggle-icon:#0a0a14;--shadow:rgba(0,0,0,0.18);--immune-col:#6d28d9;--resist-col:#0e7490;--weak-col:#c2410c;--strong-col:#15803d;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Outfit',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;-webkit-tap-highlight-color:transparent;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--dot-color) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0;}
  .page{position:relative;z-index:1;max-width:760px;margin:0 auto;padding-top:max(2.5rem,env(safe-area-inset-top));padding-bottom:max(4rem,env(safe-area-inset-bottom));padding-left:max(1.5rem,env(safe-area-inset-left));padding-right:max(1.5rem,env(safe-area-inset-right));}
  /* Header */
  .site-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
  .logo{display:flex;align-items:center;gap:14px;cursor:pointer;}
  .logo:hover .pokeball{transform:rotate(20deg);}
  .pokeball{width:44px;height:44px;flex-shrink:0;transition:transform .3s;}
  .logo-text h1{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1;color:var(--text);}
  .logo-text h1 span{color:var(--red);}
  .logo-text p{font-size:12px;color:var(--muted);font-weight:400;margin-top:3px;}
  .header-right{display:flex;align-items:center;gap:10px;}
  .gen-badge{background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:12px;font-weight:500;color:var(--muted);transition:background .3s,border-color .3s;}
  .gen-badge span{color:var(--red);font-weight:600;}
  .theme-toggle{width:38px;height:38px;border-radius:50%;background:var(--toggle-bg);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
  .theme-toggle:hover{border-color:var(--border-hover);transform:scale(1.08);}
  .theme-toggle svg{width:17px;height:17px;fill:var(--toggle-icon);transition:fill .3s;}
  .icon-sun{display:none;}.icon-moon{display:block;}
  [data-theme="light"] .icon-sun{display:block;}[data-theme="light"] .icon-moon{display:none;}
  /* Tabs */
  .tabs{display:flex;gap:4px;background:var(--surface);border-radius:20px;padding:5px;margin-bottom:1.75rem;transition:background .3s;}
  .tab{flex:1;padding:10px;border-radius:14px;border:none;background:transparent;color:var(--muted);font-family:'Outfit',system-ui,sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;}
  .tab.active{background:var(--card);color:var(--text);}
  .tab-panel{display:none;}.tab-panel.active{display:block;}
  /* Search */
  .search-wrap{position:relative;margin-bottom:.75rem;}
  .search-box{display:flex;align-items:center;gap:12px;background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:0 20px;transition:border-color .2s,background .3s;}
  .search-box:focus-within{border-color:var(--red);box-shadow:0 0 0 3px rgba(230,57,70,.12);}
  .search-box svg{flex-shrink:0;opacity:.4;color:var(--text);}
  #search{flex:1;background:none;border:none;outline:none;padding:16px 0;font-size:16px;font-family:'Outfit',system-ui,sans-serif;color:var(--text);}
  #search::placeholder{color:var(--muted);}
  .search-hint{font-size:12px;color:var(--muted);margin-top:8px;padding:0 4px;}
  /* Dropdown */
  #dropdown{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;z-index:200;overflow:hidden;max-height:280px;overflow-y:auto;transition:background .3s;}
  #dropdown::-webkit-scrollbar{width:4px;}#dropdown::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .dd-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;}
  .dd-item:last-child{border-bottom:none;}.dd-item:hover{background:var(--surface);}
  .dd-img{width:40px;height:40px;image-rendering:pixelated;}
  .dd-name{flex:1;font-size:14px;font-weight:500;text-transform:capitalize;color:var(--text);}
  .dd-num{font-size:11px;color:var(--muted);}
  /* States */
  #card{margin-top:.5rem;}
  .empty-state{text-align:center;padding:4rem 2rem;border:1.5px dashed var(--border);border-radius:20px;background:var(--surface);transition:background .3s;}
  .empty-icon{width:72px;height:72px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
  .empty-state h2{font-size:17px;font-weight:600;margin-bottom:8px;color:var(--text);}
  .empty-state p{font-size:14px;color:var(--muted);}
  .loading-state{text-align:center;padding:3rem;color:var(--muted);font-size:14px;}
  .loader{width:32px;height:32px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--red);animation:spin .7s linear infinite;margin:0 auto 1rem;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* Card */
  .poke-card{border-radius:20px;overflow:hidden;border:1px solid var(--border);background:var(--card);animation:fadeUp .3s ease;transition:background .3s,border-color .3s;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .hero{position:relative;padding:2.5rem 2rem 1.5rem;overflow:hidden;min-height:200px;}
  .hero-bg{position:absolute;inset:0;opacity:.15;}
  [data-theme="light"] .hero-bg{opacity:.28;}
  .hero-circles{position:absolute;right:-40px;top:-40px;width:260px;height:260px;border-radius:50%;opacity:.08;}
  .hero-circles::after{content:'';position:absolute;inset:30px;border-radius:50%;background:rgba(255,255,255,.5);}
  .hero-num{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--hero-num);text-transform:uppercase;margin-bottom:6px;position:relative;z-index:2;}
  .hero-layout{display:flex;align-items:flex-end;justify-content:space-between;position:relative;z-index:2;gap:1rem;}
  .hero-info{flex:1;}
  .hero-name{font-size:36px;font-weight:800;text-transform:capitalize;line-height:1;letter-spacing:-1px;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.4);margin-bottom:12px;}
  .hero-types{display:flex;gap:7px;flex-wrap:wrap;}
  .type-pill{padding:5px 14px;border-radius:100px;font-size:12px;font-weight:600;text-transform:capitalize;letter-spacing:.03em;border:1px solid rgba(255,255,255,.2);}
  /* Sprite + ability overlay */
  .sprite-wrap{position:relative;flex-shrink:0;cursor:pointer;width:150px;height:150px;}
  .hero-sprite{width:150px;height:150px;image-rendering:pixelated;filter:drop-shadow(0 8px 24px var(--shadow));transition:transform .3s ease;display:block;}
  .sprite-wrap:hover .hero-sprite{transform:translateY(-6px) scale(1.05);}
  .ability-overlay{position:absolute;inset:0;border-radius:16px;background:rgba(0,0,0,.82);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:10px 8px;opacity:0;pointer-events:none;transition:opacity .2s ease;}
  .ability-overlay.visible{opacity:1;pointer-events:auto;}
  .ability-overlay-title{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:2px;}
  .ability-chip{font-family:'Outfit',system-ui,sans-serif;cursor:pointer;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:4px 10px;font-size:11px;font-weight:600;color:#fff;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:flex;align-items:center;gap:5px;transition:background .15s,border-color .15s,transform .1s;}
  .ability-chip:hover{background:rgba(255,255,255,.22);transform:scale(1.04);}
  .ability-chip.active{background:rgba(255,255,255,.28);border-color:rgba(255,255,255,.5);transform:scale(1.04);}
  .ability-chip.hidden-ab{background:rgba(168,85,247,.25);border-color:rgba(168,85,247,.45);}
  .ability-chip.hidden-ab.active{background:rgba(168,85,247,.45);border-color:rgba(168,85,247,.7);}
  .ability-hidden-label{font-size:8px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#a855f7;background:rgba(168,85,247,.2);border-radius:100px;padding:1px 5px;}
  /* Ability description panel */
  .ability-desc-panel{margin:10px 1.5rem 0;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;animation:abilitySlideIn .22s cubic-bezier(.34,1.56,.64,1);transform-origin:top center;}
  @keyframes abilitySlideIn{from{opacity:0;transform:scaleY(.85) translateY(-6px)}to{opacity:1;transform:scaleY(1) translateY(0)}}
  .ability-desc-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .ability-desc-name-row{display:flex;align-items:center;gap:7px;}
  .ability-desc-name{font-size:14px;font-weight:700;color:var(--text);}
  .ability-desc-close{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--muted);transition:background .15s,color .15s;}
  .ability-desc-close:hover{background:var(--border);color:var(--text);}
  .ability-desc-text{font-size:13px;line-height:1.55;color:var(--muted);font-style:italic;}
  /* Body */
  .poke-body{padding:1.75rem 2rem;}
  .section-label{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .stats-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.75rem;}
  .stat-card{background:var(--surface);border-radius:12px;padding:12px 14px;border:1px solid var(--border);transition:background .3s,border-color .3s;}
  .stat-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .stat-value{font-size:22px;font-weight:700;color:var(--text);line-height:1;}
  .stat-bar-track{height:3px;background:var(--stat-track);border-radius:3px;margin-top:8px;overflow:hidden;}
  .stat-bar-fill{height:100%;border-radius:3px;}
  .sep{height:1px;background:var(--border);margin:1.75rem 0;}
  .matchup-block,.type-ms{margin-bottom:1.5rem;}
  .matchup-block:last-child,.type-ms:last-child{margin-bottom:0;}
  .matchup-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .m-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:100px;font-size:15px;font-weight:600;text-transform:capitalize;border:1px solid rgba(0,0,0,.15);}
  .m-mult{font-size:12px;font-weight:700;opacity:.75;background:rgba(0,0,0,.2);padding:2px 6px;border-radius:100px;}
  .immune-label{color:var(--immune-col);}.resist-label{color:var(--resist-col);}.weak-label{color:var(--weak-col);}.dblweak-label{color:var(--red);}.strong-label{color:var(--strong-col);}
  .stats-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 16px;cursor:pointer;font-family:'Outfit',system-ui,sans-serif;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:1.75rem;transition:background .2s,border-color .2s;}
  .stats-toggle:hover{background:var(--surface2);border-color:var(--border-hover);color:var(--text);}
  .stats-toggle-left{display:flex;align-items:center;gap:8px;}
  .stats-toggle-left span{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
  .stats-total-pill{background:var(--surface2);border-radius:100px;padding:2px 10px;font-size:11px;font-weight:600;color:var(--text);}
  .stats-chevron{width:16px;height:16px;transition:transform .25s;opacity:.5;}
  .stats-chevron.open{transform:rotate(180deg);}
  .stats-drawer{overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
  .stats-drawer.open{max-height:600px;}
  .stats-drawer-inner{padding-bottom:1.75rem;}
  /* Type browser */
  .type-intro{font-size:13px;color:var(--muted);margin-bottom:1.25rem;padding:0 2px;}
  .types-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem;}
  @media(min-width:500px){.types-grid{grid-template-columns:repeat(6,1fr);}}
  .type-btn{display:flex;flex-direction:column;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:12px 8px 10px;cursor:pointer;transition:all .18s;font-family:'Outfit',system-ui,sans-serif;}
  .type-btn:hover{background:var(--surface2);transform:translateY(-3px);border-color:var(--border-hover);box-shadow:0 6px 18px rgba(0,0,0,.18);}
  .type-btn.selected{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.22);}
  .type-btn-name{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:capitalize;}
  .type-result{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;animation:fadeUp .25s ease;transition:background .3s;}
  .type-result-hero{padding:1.5rem 2rem;position:relative;overflow:hidden;}
  .type-result-hero-bg{position:absolute;inset:0;opacity:.18;}[data-theme="light"] .type-result-hero-bg{opacity:.3;}
  .type-result-inner{position:relative;z-index:2;display:flex;align-items:center;gap:16px;}
  .type-result-name{font-size:28px;font-weight:800;text-transform:capitalize;color:#fff;letter-spacing:-.5px;text-shadow:0 2px 12px rgba(0,0,0,.35);}
  .type-result-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px;}
  .type-result-body{padding:1.5rem 2rem;}
  .type-icon{border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 -3px 0 rgba(0,0,0,.25),inset 0 2px 0 rgba(255,255,255,.2);}

  /* ── Team Builder ── */
  .tb-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.5rem;}
  @media(max-width:480px){.tb-grid{grid-template-columns:1fr;}}
  .tb-col-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .tb-col-label svg{opacity:.5;}
  .tb-slots{display:flex;flex-direction:column;gap:8px;}
  .tb-slot{background:var(--surface);border:1.5px dashed var(--border);border-radius:14px;min-height:60px;display:flex;align-items:center;padding:8px 12px;gap:10px;position:relative;transition:border-color .2s,background .2s;}
  .tb-slot.filled{border-style:solid;border-color:var(--border);}
  .tb-slot.filled:hover{background:var(--surface2);}
  .tb-slot-empty{font-size:12px;color:var(--muted);flex:1;text-align:center;}
  .tb-slot-img{width:44px;height:44px;image-rendering:pixelated;flex-shrink:0;}
  .tb-slot-name{font-size:13px;font-weight:600;color:var(--text);text-transform:capitalize;flex:1;}
  .tb-slot-types{display:flex;gap:4px;flex-wrap:wrap;}
  .tb-slot-type{padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;text-transform:capitalize;color:#fff;}
  .tb-slot-remove{width:24px;height:24px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--muted);font-size:16px;line-height:1;transition:background .15s,color .15s;}
  .tb-slot-remove:hover{background:rgba(230,57,70,.15);color:var(--red);border-color:rgba(230,57,70,.3);}
  .tb-add-btn{background:var(--surface);border:1.5px dashed var(--border);border-radius:14px;padding:10px;cursor:pointer;font-family:'Outfit',system-ui,sans-serif;font-size:13px;font-weight:500;color:var(--muted);width:100%;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .2s,border-color .2s,color .2s;}
  .tb-add-btn:hover{background:var(--surface2);border-color:var(--border-hover);color:var(--text);}
  .tb-add-btn:disabled{opacity:.35;cursor:not-allowed;}
  .tb-search-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding-top:80px;}
  .tb-search-box{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:480px;margin:0 1rem;overflow:hidden;animation:fadeUp .2s ease;}
  .tb-search-inner{display:flex;align-items:center;gap:12px;padding:0 20px;border-bottom:1px solid var(--border);}
  .tb-search-inner svg{opacity:.35;flex-shrink:0;color:var(--text);}
  .tb-search-input{flex:1;background:none;border:none;outline:none;padding:16px 0;font-size:16px;font-family:'Outfit',system-ui,sans-serif;color:var(--text);}
  .tb-search-input::placeholder{color:var(--muted);}
  .tb-search-results{max-height:320px;overflow-y:auto;}
  .tb-search-results::-webkit-scrollbar{width:4px;}
  .tb-search-results::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .tb-result-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;}
  .tb-result-item:last-child{border-bottom:none;}
  .tb-result-item:hover{background:var(--surface);}
  .tb-result-img{width:36px;height:36px;image-rendering:pixelated;}
  .tb-result-name{flex:1;font-size:14px;font-weight:500;text-transform:capitalize;color:var(--text);}
  .tb-result-num{font-size:11px;color:var(--muted);}
  .tb-analyze-btn{width:100%;padding:14px;background:var(--red);border:none;border-radius:14px;color:#fff;font-family:'Outfit',system-ui,sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:.5rem;transition:opacity .2s,transform .1s;letter-spacing:.02em;}
  .tb-analyze-btn:hover{opacity:.88;}
  .tb-analyze-btn:active{transform:scale(.98);}
  .tb-analyze-btn:disabled{opacity:.35;cursor:not-allowed;}
  /* Results */
  .tb-results{margin-top:1.5rem;display:flex;flex-direction:column;gap:14px;}
  .tb-result-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;animation:fadeUp .3s ease;}
  .tb-result-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);}
  .tb-result-header img{width:52px;height:52px;image-rendering:pixelated;}
  .tb-result-header-info{flex:1;}
  .tb-result-header-name{font-size:16px;font-weight:700;text-transform:capitalize;color:var(--text);}
  .tb-result-header-types{display:flex;gap:5px;margin-top:4px;}
  .tb-counters{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
  .tb-counter-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:12px;background:var(--surface);border:1px solid var(--border);}
  .tb-counter-rank{font-size:11px;font-weight:700;color:var(--muted);width:18px;flex-shrink:0;text-align:center;}
  .tb-counter-img{width:36px;height:36px;image-rendering:pixelated;flex-shrink:0;}
  .tb-counter-name{flex:1;font-size:13px;font-weight:600;text-transform:capitalize;color:var(--text);}
  .tb-counter-score{font-size:12px;font-weight:700;padding:3px 10px;border-radius:100px;flex-shrink:0;}
  .tb-score-great{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.3);}
  .tb-score-good{background:rgba(250,204,21,.15);color:#facc15;border:1px solid rgba(250,204,21,.3);}
  .tb-score-neutral{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
  .tb-score-bad{background:rgba(230,57,70,.1);color:var(--red);border:1px solid rgba(230,57,70,.25);}
  .tb-empty-team{text-align:center;padding:2rem;color:var(--muted);font-size:13px;border:1.5px dashed var(--border);border-radius:14px;background:var(--surface);}

  .normal-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;background:none;border:none;font-family:'Outfit',system-ui,sans-serif;padding:4px 0;margin-top:1rem;color:var(--muted);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
  .normal-toggle:hover{color:var(--text);}
  .normal-toggle-chevron{width:14px;height:14px;transition:transform .2s;opacity:.5;}
  .normal-toggle-chevron.open{transform:rotate(180deg);}
  .normal-drawer{overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.4,0,.2,1);}
  .normal-drawer.open{max-height:400px;}
</style>
</head>
<body>

        <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>

<script>
const TC={normal:{bg:'#8a8a7a'},fire:{bg:'#c8312a'},water:{bg:'#3b7fd4'},electric:{bg:'#c8a800'},grass:{bg:'#4a9e2a'},ice:{bg:'#5aace0'},fighting:{bg:'#c06010'},poison:{bg:'#8844bb'},ground:{bg:'#9c7038'},flying:{bg:'#5090d0'},psychic:{bg:'#cc3060'},bug:{bg:'#7a9010'},rock:{bg:'#909060'},ghost:{bg:'#664488'},dragon:{bg:'#4050b0'},dark:{bg:'#333028'},steel:{bg:'#4090a8'},fairy:{bg:'#cc50cc'}};
const TYPE_IDS={normal:1,fighting:2,flying:3,poison:4,ground:5,rock:6,bug:7,ghost:8,steel:9,fire:10,water:11,grass:12,electric:13,psychic:14,ice:15,dragon:16,dark:17,fairy:18};
const CHART={normal:{rock:.5,ghost:0,steel:.5},fire:{fire:.5,water:.5,grass:2,ice:2,bug:2,rock:.5,dragon:.5,steel:2},water:{fire:2,water:.5,grass:.5,ground:2,rock:2,dragon:.5},electric:{water:2,electric:.5,grass:.5,ground:0,flying:2,dragon:.5},grass:{fire:.5,water:2,grass:.5,poison:.5,ground:2,flying:.5,bug:.5,rock:2,dragon:.5,steel:.5},ice:{fire:.5,water:.5,grass:2,ice:.5,ground:2,flying:2,dragon:2,steel:.5},fighting:{normal:2,ice:2,poison:.5,flying:.5,psychic:.5,bug:.5,rock:2,ghost:0,dark:2,steel:2,fairy:.5},poison:{grass:2,poison:.5,ground:.5,rock:.5,ghost:.5,steel:0,fairy:2},ground:{fire:2,electric:2,grass:.5,poison:2,flying:0,bug:.5,rock:2,steel:2},flying:{electric:.5,grass:2,fighting:2,bug:2,rock:.5,steel:.5},psychic:{fighting:2,poison:2,psychic:.5,dark:0,steel:.5},bug:{fire:.5,grass:2,fighting:.5,poison:.5,flying:.5,psychic:2,ghost:.5,dark:2,steel:.5,fairy:.5},rock:{fire:2,ice:2,fighting:.5,ground:.5,flying:2,bug:2,steel:.5},ghost:{normal:0,psychic:2,ghost:2,dark:.5},dragon:{dragon:2,steel:.5,fairy:0},dark:{fighting:.5,psychic:2,ghost:2,dark:.5,fairy:.5},steel:{fire:.5,water:.5,electric:.5,ice:2,rock:2,steel:.5,fairy:2},fairy:{fire:.5,fighting:2,poison:.5,dragon:2,dark:2,steel:.5}};
const AT=Object.keys(CHART);

function typeImgUrl(type){return`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/types/generation-ix/scarlet-violet/small/${TYPE_IDS[type]||1}.png`;}
function fname(n){return n.split('-').map(p=>p[0].toUpperCase()+p.slice(1)).join(' ');}
function fid(id){return'#'+String(id).padStart(4,'0');}
function artwork(id){return`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;}
function sprite(id){return`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;}
function pill(t){const c=TC[t]||{bg:'#888'};return`<span class="type-pill" style="background:${c.bg};color:#fff">${t}</span>`;}
function chip(t,lbl){const c=TC[t]||{bg:'#888'};return`<span class="m-chip" style="background:${c.bg};color:#fff">${t}<span class="m-mult">${lbl}</span></span>`;}
function statColor(p){if(p>75)return'#22d3ee';if(p>50)return'#4ade80';if(p>30)return'#facc15';return'#f87171';}

function calcDefMult(types){const m={};AT.forEach(t=>m[t]=1);types.forEach(def=>{AT.forEach(atk=>{const c=CHART[atk]||{};m[atk]*=(c[def]!==undefined?c[def]:1);});});return m;}
function calcOffensive(types){const strong=[],notVery=[],noEffect=[];AT.forEach(defType=>{const best=Math.max(...types.map(atkType=>{const c=CHART[atkType]||{};return c[defType]!==undefined?c[defType]:1;}));if(best>=2)strong.push(defType);else if(best<=0)noEffect.push(defType);else if(best<=.5)notVery.push(defType);});return{strong,notVery,noEffect};}

function allMatchupsHTML(types,cls){
  const defMult=calcDefMult(types);
  const{strong,notVery,noEffect}=calcOffensive(types);
  const w4=AT.filter(t=>defMult[t]===4),w2=AT.filter(t=>defMult[t]===2);
  const r05=AT.filter(t=>defMult[t]===.5),r025=AT.filter(t=>defMult[t]===.25);
  const imm=AT.filter(t=>defMult[t]===0);
  const norm=AT.filter(t=>defMult[t]===1);
  const uid='nx'+Math.random().toString(36).slice(2,7);
  const normalSection=norm.length?`
    <button class="normal-toggle" onclick="toggleNormal('${uid}')">
      <svg class="normal-toggle-chevron" id="chev-${uid}" viewBox="0 0 14 14" fill="none"><path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Normal damage — 1×
      <span style="background:var(--surface2);border-radius:100px;padding:1px 8px;font-size:11px;color:var(--text);margin-left:2px">${norm.length}</span>
    </button>
    <div class="normal-drawer" id="drawer-${uid}">
      <div class="${cls}" style="margin-top:8px"><div class="matchup-row">${norm.map(t=>chip(t,'1×')).join('')}</div></div>
    </div>`:'';
  return[
    w4.length?`<div class="${cls}"><div class="section-label dblweak-label">Double weak — 4×</div><div class="matchup-row">${w4.map(t=>chip(t,'4×')).join('')}</div></div>`:'',
    w2.length?`<div class="${cls}"><div class="section-label weak-label">Weak — 2×</div><div class="matchup-row">${w2.map(t=>chip(t,'2×')).join('')}</div></div>`:'',
    strong.length?`<div class="${cls}"><div class="section-label strong-label">Strong against — 2×</div><div class="matchup-row">${strong.map(t=>chip(t,'2×')).join('')}</div></div>`:'',
    r05.length?`<div class="${cls}"><div class="section-label resist-label">Resists — 0.5×</div><div class="matchup-row">${r05.map(t=>chip(t,'½×')).join('')}</div></div>`:'',
    r025.length?`<div class="${cls}"><div class="section-label resist-label">Double resist — 0.25×</div><div class="matchup-row">${r025.map(t=>chip(t,'¼×')).join('')}</div></div>`:'',
    imm.length?`<div class="${cls}"><div class="section-label immune-label">Immune — 0×</div><div class="matchup-row">${imm.map(t=>chip(t,'0×')).join('')}</div></div>`:'',
    notVery.length?`<div class="${cls}"><div class="section-label resist-label">Not very effective — 0.5×</div><div class="matchup-row">${notVery.map(t=>chip(t,'½×')).join('')}</div></div>`:'',
    noEffect.length?`<div class="${cls}"><div class="section-label immune-label">No effect — 0×</div><div class="matchup-row">${noEffect.map(t=>chip(t,'0×')).join('')}</div></div>`:'',
    normalSection
  ].filter(Boolean).join('')||'<p style="color:var(--muted);font-size:13px">No notable matchups</p>';
}

function toggleNormal(uid){
  const drawer=document.getElementById('drawer-'+uid);
  const chev=document.getElementById('chev-'+uid);
  if(!drawer)return;
  const open=drawer.classList.toggle('open');
  chev.classList.toggle('open',open);
  drawer.style.maxHeight=open?(drawer.scrollHeight+40)+'px':'0';
}

/* Theme */
function toggleTheme(){const h=document.documentElement;const n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;localStorage.setItem('poke-theme',n);}
(()=>{const s=localStorage.getItem('poke-theme');if(s)document.documentElement.dataset.theme=s;else if(window.matchMedia('(prefers-color-scheme: light)').matches)document.documentElement.dataset.theme='light';})();

function goHome(){document.getElementById('search').value='';document.getElementById('dropdown').style.display='none';document.getElementById('card').innerHTML=`<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 100 100" width="72" height="72"><circle cx="50" cy="50" r="49" fill="#222"/><path d="M1 50 a49 49 0 0 1 98 0 Z" fill="#e63946"/><path d="M1 50 a49 49 0 0 0 98 0 Z" fill="#f5f5f5"/><rect x="1" y="44" width="98" height="12" fill="#111"/><circle cx="50" cy="50" r="15" fill="#111"/><circle cx="50" cy="50" r="11" fill="#f5f5f5"/><circle cx="50" cy="50" r="5.5" fill="#222"/><path d="M43 43 a9 9 0 0 1 9 -5" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg></div><h2>Search for a Pokémon</h2><p>See type matchups, base stats, abilities and weaknesses</p></div>`;switchTab('pokemon');}
function switchTab(name,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));if(btn)btn.classList.add('active');else{const idx=name==='pokemon'?0:name==='types'?1:2;document.querySelectorAll('.tab')[idx].classList.add('active');}document.getElementById('tab-'+name).classList.add('active');}
function buildTypeGrid(){const grid=document.getElementById('types-grid');AT.forEach(type=>{const c=TC[type]||{bg:'#888'};const btn=document.createElement('button');btn.className='type-btn';btn.dataset.type=type;btn.innerHTML=`<img src="${typeImgUrl(type)}" width="56" height="56" alt="${type}" style="border-radius:14px;object-fit:contain;image-rendering:pixelated;display:block;" onerror="this.style.display='none'"/><span class="type-btn-name" style="color:var(--text)">${type}</span>`;btn.addEventListener('click',()=>showType(type,btn));grid.appendChild(btn);});}
function showType(type,btn){document.querySelectorAll('.type-btn').forEach(b=>{b.classList.remove('selected');b.style.borderColor='';});btn.classList.add('selected');const c=TC[type]||{bg:'#888'};btn.style.borderColor=c.bg;document.getElementById('type-result').innerHTML=`<div class="type-result"><div class="type-result-hero" style="background:${c.bg}22"><div class="type-result-hero-bg" style="background:${c.bg}"></div><div class="type-result-inner"><img src="${typeImgUrl(type)}" width="64" height="64" alt="${type}" style="border-radius:16px;object-fit:contain;image-rendering:pixelated;display:block;" onerror="this.style.display='none'"/><div><div class="type-result-name">${type.charAt(0).toUpperCase()+type.slice(1)} type</div><div class="type-result-sub">Offensive &amp; defensive matchups</div></div></div></div><div class="type-result-body"><div class="section-label" style="margin-bottom:14px">Type matchups</div>${allMatchupsHTML([type],'type-ms')}</div></div>`;document.getElementById('type-result').scrollIntoView({behavior:'smooth',block:'nearest'});}

/* Pokémon search */
let allPoke=[],dbt=null;
async function loadList(){try{const r=await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000');const d=await r.json();allPoke=d.results.map(p=>({name:p.name,id:parseInt(p.url.split('/').filter(Boolean).pop())}));}catch(e){}}

/* Ability state */
let _abilityVisible=false;
let _selectedAbility=null; /* {name, isHidden} */

function setAbilityOverlayVisible(v){
  _abilityVisible=v;
  const el=document.getElementById('ability-overlay');
  if(el)el.classList.toggle('visible',v);
}

async function handleAbilityClick(e,name,isHidden){
  e.stopPropagation();
  if(_selectedAbility&&_selectedAbility.name===name){
    _selectedAbility=null;
    renderAbilityDesc(null);
    document.querySelectorAll('.ability-chip').forEach(c=>c.classList.remove('active'));
    return;
  }
  _selectedAbility={name,isHidden};
  document.querySelectorAll('.ability-chip').forEach(c=>c.classList.remove('active'));
  const chip=document.getElementById('chip-'+name);
  if(chip)chip.classList.add('active');
  renderAbilityDesc({name,isHidden,desc:null,loading:true});
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/ability/${name}`);
    const d=await r.json();
    const entries=d.flavor_text_entries.filter(e=>e.language.name==='en');
    const text=(entries[entries.length-1]?.flavor_text||'No description available.').replace(/\f/g,' ').replace(/\n/g,' ');
    renderAbilityDesc({name,isHidden,desc:text,loading:false});
  }catch{renderAbilityDesc({name,isHidden,desc:'Could not load description.',loading:false});}
}

function renderAbilityDesc(info){
  const container=document.getElementById('ability-desc-container');
  if(!container)return;
  if(!info){container.innerHTML='';return;}
  const hiddenBadge=info.isHidden?`<span class="ability-hidden-label">Hidden</span>`:'';
  container.innerHTML=`<div class="ability-desc-panel"><div class="ability-desc-header"><div class="ability-desc-name-row">${hiddenBadge}<span class="ability-desc-name">${fname(info.name)}</span></div><button class="ability-desc-close" onclick="dismissAbilityDesc()" aria-label="Close"><svg viewBox="0 0 14 14" fill="none" width="14" height="14"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button></div><p class="ability-desc-text">${info.loading?'Loading…':info.desc}</p></div>`;
}

function dismissAbilityDesc(){
  _selectedAbility=null;
  document.querySelectorAll('.ability-chip').forEach(c=>c.classList.remove('active'));
  const container=document.getElementById('ability-desc-container');
  if(container)container.innerHTML='';
}

async function showPoke(name){
  _abilityVisible=false;_selectedAbility=null;
  document.getElementById('card').innerHTML='<div class="loading-state"><div class="loader"></div>Loading Pokémon data...</div>';
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
    const d=await r.json();
    const types=d.types.map(t=>t.type.name);
    const pid=d.id;
    const mainColor=(TC[types[0]]||{bg:'#888'}).bg;
    const gs=n=>d.stats.find(s=>s.stat.name===n)?.base_stat||0;
    const stats=[{l:'HP',v:gs('hp'),max:255},{l:'Attack',v:gs('attack'),max:190},{l:'Defense',v:gs('defense'),max:230},{l:'Sp.Atk',v:gs('special-attack'),max:194},{l:'Sp.Def',v:gs('special-defense'),max:230},{l:'Speed',v:gs('speed'),max:200}];
    const total=stats.reduce((a,s)=>a+s.v,0);
    const abilities=d.abilities.map(a=>({name:a.ability.name,isHidden:a.is_hidden}));
    const regularAbilities=abilities.filter(a=>!a.isHidden);
    const hiddenAbility=abilities.find(a=>a.isHidden);

    const abilityChipsHTML=[
      ...regularAbilities.map(a=>`<button id="chip-${a.name}" class="ability-chip" onclick="handleAbilityClick(event,'${a.name}',false)">${fname(a.name)}</button>`),
      hiddenAbility?`<button id="chip-${hiddenAbility.name}" class="ability-chip hidden-ab" onclick="handleAbilityClick(event,'${hiddenAbility.name}',true)"><span class="ability-hidden-label">Hidden</span>${fname(hiddenAbility.name)}</button>`:''
    ].join('');

    document.getElementById('card').innerHTML=`
      <div class="poke-card">
        <div class="hero" style="background:${mainColor}22">
          <div class="hero-bg" style="background:${mainColor}"></div>
          <div class="hero-circles" style="background:${mainColor}"></div>
          <div class="hero-num">${fid(pid)}</div>
          <div class="hero-layout">
            <div class="hero-info">
              <div class="hero-name">${fname(name)}</div>
              <div class="hero-types">${types.map(pill).join('')}</div>
            </div>
            <div class="sprite-wrap" id="sprite-wrap" onclick="toggleAbilityOverlay()" onmouseenter="setAbilityOverlayVisible(true)" onmouseleave="setAbilityOverlayVisible(false)" title="Tap to see abilities">
              <img class="hero-sprite" src="${artwork(pid)}" alt="${name}" onerror="this.src='${sprite(pid)}'"/>
              <div class="ability-overlay" id="ability-overlay">
                <div class="ability-overlay-title">Tap an ability</div>
                ${abilityChipsHTML}
              </div>
            </div>
          </div>
        </div>
        <div id="ability-desc-container"></div>
        <div class="poke-body">
          <div class="section-label" style="margin-bottom:14px">Type matchups</div>
          ${allMatchupsHTML(types,'matchup-block')}
          <div class="sep"></div>
          <button class="stats-toggle" onclick="toggleStats(this)">
            <div class="stats-toggle-left">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="opacity:.5"><rect x="1" y="4" width="2" height="9" rx="1" fill="currentColor"/><rect x="6" y="1" width="2" height="12" rx="1" fill="currentColor"/><rect x="11" y="6" width="2" height="7" rx="1" fill="currentColor"/></svg>
              <span>Base stats</span>
              <div class="stats-total-pill">${total} BST</div>
            </div>
            <svg class="stats-chevron" viewBox="0 0 16 16" fill="none"><path d="M3 6l5 5 5-5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="stats-drawer">
            <div class="stats-drawer-inner">
              <div class="stats-grid">${stats.map(s=>{const pct=Math.round(Math.min(100,s.v/s.max*100));return`<div class="stat-card"><div class="stat-label">${s.l}</div><div class="stat-value">${s.v}</div><div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%;background:${statColor(pct)}"></div></div></div>`;}).join('')}</div>
            </div>
          </div>
        </div>
      </div>`;
  }catch(e){document.getElementById('card').innerHTML='<div class="empty-state"><h2>Failed to load</h2><p>Check your connection and try again.</p></div>';}
}

function toggleAbilityOverlay(){
  const next=!_abilityVisible;
  setAbilityOverlayVisible(next);
  if(!next){dismissAbilityDesc();}
}

function toggleStats(btn){
  const drawer=btn.nextElementSibling;
  const chevron=btn.querySelector('.stats-chevron');
  const isOpen=drawer.classList.contains('open');
  drawer.classList.toggle('open',!isOpen);
  chevron.classList.toggle('open',!isOpen);
}

const searchEl=document.getElementById('search');
const dd=document.getElementById('dropdown');
let dbt2=null;
searchEl.addEventListener('input',()=>{
  clearTimeout(dbt2);
  dbt2=setTimeout(()=>{
    const q=searchEl.value.toLowerCase().trim();
    if(!q){dd.style.display='none';return;}
    const num=parseInt(q);
    let matches=isNaN(num)?allPoke.filter(p=>p.name.includes(q)).slice(0,20):allPoke.filter(p=>p.id===num);
    if(!matches.length){dd.style.display='none';return;}
    dd.innerHTML=matches.map(p=>`<div class="dd-item" data-name="${p.name}"><img class="dd-img" src="${sprite(p.id)}" alt="${p.name}" loading="lazy"/><span class="dd-name">${fname(p.name)}</span><span class="dd-num">${fid(p.id)}</span></div>`).join('');
    dd.style.display='block';
    dd.querySelectorAll('.dd-item').forEach(el=>{el.addEventListener('click',()=>{searchEl.value=fname(el.dataset.name);dd.style.display='none';showPoke(el.dataset.name);});});
  },140);
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))dd.style.display='none';});
buildTypeGrid();
loadList();


/* ══ TEAM BUILDER ══ */
let myTeam=[];    /* [{name,id,types,sprite}] */
let oppTeam=[];   /* [{name,id,types,sprite}] */
let tbTarget=null; /* 'my' | 'opp' */
let tbDbt=null;

function openModal(target){
  tbTarget=target;
  document.getElementById('tb-modal').style.display='flex';
  document.getElementById('tb-search-input').value='';
  document.getElementById('tb-search-results').innerHTML='';
  setTimeout(()=>document.getElementById('tb-search-input').focus(),50);
}
function closeModal(){document.getElementById('tb-modal').style.display='none';tbTarget=null;}
function closeModalOutside(e){if(e.target===document.getElementById('tb-modal'))closeModal();}

document.getElementById('tb-search-input').addEventListener('input',function(){
  clearTimeout(tbDbt);
  const q=this.value.toLowerCase().trim();
  if(!q){document.getElementById('tb-search-results').innerHTML='';return;}
  tbDbt=setTimeout(()=>{
    const num=parseInt(q);
    const matches=isNaN(num)?allPoke.filter(p=>p.name.includes(q)).slice(0,25):allPoke.filter(p=>p.id===num);
    document.getElementById('tb-search-results').innerHTML=matches.map(p=>`
      <div class="tb-result-item" onclick="selectPoke('${p.name}',${p.id})">
        <img class="tb-result-img" src="${sprite(p.id)}" alt="${p.name}" loading="lazy"/>
        <span class="tb-result-name">${fname(p.name)}</span>
        <span class="tb-result-num">${fid(p.id)}</span>
      </div>`).join('');
  },120);
});

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

async function selectPoke(name,id){
  const target=tbTarget;
  const team=target==='my'?myTeam:oppTeam;
  if(team.length>=6)return;
  if(team.find(p=>p.name===name))return;
  closeModal();
  try{
    const r=await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
    const d=await r.json();
    const types=d.types.map(t=>t.type.name);
    const pid=d.id;
    team.push({name,id:pid,types,spriteUrl:sprite(pid)});
    renderSlots(target);
  }catch(e){console.error(e);}
}

function removePoke(target,name){
  if(target==='my')myTeam=myTeam.filter(p=>p.name!==name);
  else oppTeam=oppTeam.filter(p=>p.name!==name);
  renderSlots(target);
  document.getElementById('tb-results').innerHTML='';
}

function renderSlots(target){
  const team=target==='my'?myTeam:oppTeam;
  const container=document.getElementById(target+'-slots');
  const addBtn=document.getElementById(target+'-add-btn');
  container.innerHTML=team.map(p=>`
    <div class="tb-slot filled">
      <img class="tb-slot-img" src="${p.spriteUrl}" alt="${p.name}"/>
      <div style="flex:1;min-width:0">
        <div class="tb-slot-name">${fname(p.name)}</div>
        <div class="tb-slot-types">${p.types.map(t=>`<span class="tb-slot-type" style="background:${(TC[t]||{bg:'#888'}).bg}">${t}</span>`).join('')}</div>
      </div>
      <button class="tb-slot-remove" onclick="removePoke('${target}','${p.name}')" title="Remove">×</button>
    </div>`).join('');
  addBtn.disabled=team.length>=6;
}

/* Score = best offensive mult from myPoke.types against oppPoke.types */
function battleScore(myTypes,oppTypes){
  const oppMult=calcDefMult(oppTypes);
  return Math.max(...myTypes.map(t=>oppMult[t]||1));
}

function scoreLabel(score){
  if(score>=4)return{cls:'tb-score-great',txt:'4× Super!'};
  if(score>=2)return{cls:'tb-score-great',txt:'2× Strong'};
  if(score===1)return{cls:'tb-score-neutral',txt:'Neutral'};
  if(score<=0)return{cls:'tb-score-bad',txt:'No effect'};
  return{cls:'tb-score-good',txt:'0.5× Weak'};
}

function analyzeMatchups(){
  const results=document.getElementById('tb-results');
  if(!myTeam.length||!oppTeam.length){
    results.innerHTML='<div class="tb-empty-team">Add at least one Pokémon to each team first.</div>';
    return;
  }
  results.innerHTML='<div class="tb-results">'+oppTeam.map(opp=>{
    const ranked=[...myTeam].map(my=>({...my,score:battleScore(my.types,opp.types)}))
      .sort((a,b)=>b.score-a.score);
    const sl=scoreLabel(ranked[0].score);
    const countersHTML=ranked.map((my,i)=>{
      const s=scoreLabel(my.score);
      return`<div class="tb-counter-row">
        <span class="tb-counter-rank">${i+1}</span>
        <img class="tb-counter-img" src="${my.spriteUrl}" alt="${my.name}"/>
        <span class="tb-counter-name">${fname(my.name)}</span>
        <span class="tb-counter-score ${s.cls}">${s.txt}</span>
      </div>`;
    }).join('');
    return`<div class="tb-result-card">
      <div class="tb-result-header" style="background:${(TC[opp.types[0]]||{bg:'#888'}).bg}22">
        <img src="${opp.spriteUrl}" alt="${opp.name}"/>
        <div class="tb-result-header-info">
          <div class="tb-result-header-name">${fname(opp.name)}</div>
          <div class="tb-result-header-types">${opp.types.map(t=>`<span class="tb-slot-type" style="background:${(TC[t]||{bg:'#888'}).bg}">${t}</span>`).join('')}</div>
        </div>
        <span class="tb-counter-score ${sl.cls}" style="align-self:center">Best: ${sl.txt}</span>
      </div>
      <div class="tb-counters">
        <div class="section-label" style="margin-bottom:6px">Your team ranked</div>
        ${countersHTML}
      </div>
    </div>`;
  }).join('')+'</div>';
  document.getElementById('tb-results').scrollIntoView({behavior:'smooth',block:'nearest'});
}

</script>
